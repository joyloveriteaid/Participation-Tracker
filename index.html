<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Participation Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #F0F2F6; color: #1A1A2E; }
    button { font-family: inherit; }
    input, select, textarea { font-family: inherit; }
    @media print {
      .no-print { display: none !important; }
      .print-only { display: block !important; }
      body { background: white; }
      .report-card { page-break-inside: avoid; }
    }
    .print-only { display: none; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const PERIODS = ["P1", "P2", "P3", "P4", "P5"];

const PERIOD_COLORS = {
  P1: { bg: "#E8F5F0", accent: "#4C9B82", text: "#1B5E47" },
  P2: { bg: "#EBF3FF", accent: "#5B8DD9", text: "#1B3A6B" },
  P3: { bg: "#F3EEFF", accent: "#9B6DD1", text: "#3D1A80" },
  P4: { bg: "#FFF5E6", accent: "#E8934A", text: "#7A3D00" },
  P5: { bg: "#FFEAF0", accent: "#D4527A", text: "#7A1636" },
};

const CATEGORIES = [
  { id: "entrance",  label: "Entrance Ticket",     emoji: "🎫", points: 1,  color: "#4C9B82" },
  { id: "turntalk",  label: "Turn & Talk",          emoji: "🗣️", points: 1,  color: "#E8934A" },
  { id: "reasoning", label: "Answer + Reasoning",   emoji: "🧠", points: 1,  color: "#5B8DD9" },
  { id: "vocab",     label: "Question + Vocab",     emoji: "📚", points: 1,  color: "#9B6DD1" },
  { id: "sharework", label: "Share Work Publicly",  emoji: "🌟", points: 1,  color: "#D4A017" },
  { id: "offtask",   label: "Off-Task Talking",     emoji: "🔇", points: -1, color: "#E05C5C" },
];

const DEFAULT_STUDENTS = {
  P1: ["Aaliyah", "Brandon", "Celeste", "David", "Esther", "Felix", "Grace", "Henry"],
  P2: ["Isabel", "James", "Kira", "Leo", "Maya", "Nathan", "Olivia", "Patrick"],
  P3: ["Quinn", "Rosa", "Samuel", "Talia", "Ulric", "Vera", "Wesley", "Xena"],
  P4: ["Yasmine", "Zachary", "Amara", "Ben", "Chloe", "Diego", "Elena", "Frank"],
  P5: ["Gina", "Hector", "Iris", "Jake", "Karen", "Luis", "Mia", "Nora"],
};

const STORAGE_BASE = "pt_v2_";

const loadPeriodData = (period) => {
  try {
    const raw = localStorage.getItem(STORAGE_BASE + period);
    if (raw) {
      const data = JSON.parse(raw);
      // Always recalculate totalPoints from history to fix any double-counting
      return data.map(s => ({
        ...s,
        history: s.history || [],
        totalPoints: (s.history || []).reduce(function(sum, day) { return sum + (day.points || 0); }, 0),
      }));
    }
  } catch(e) {}
  return DEFAULT_STUDENTS[period].map(name => ({
    name, points: 0, log: [], attendance: "absent",
    notes: "", parentNote: "", history: [], totalPoints: 0
  }));
};

const savePeriodData = (period, students) => {
  try { localStorage.setItem(STORAGE_BASE + period, JSON.stringify(students)); } catch(e) {}
};

const getTodayStr = () => new Date().toLocaleDateString("en-US", { weekday:"short", month:"short", day:"numeric", year:"numeric" });
const getTimeStr = () => new Date().toLocaleTimeString("en-US", { hour:"2-digit", minute:"2-digit" });
const getShortDateStr = () => new Date().toLocaleDateString("en-US", { month:"short", day:"numeric" });

function getAttendanceMeta(att) {
  if (att === "present") return { icon: "✅", label: "Present", color: "#4C9B82", bg: "#E8F5F0", border: "#4C9B82" };
  if (att === "absent")  return { icon: "❌", label: "Absent",  color: "#E05C5C", bg: "#FFF1F1", border: "#E05C5C" };
  return { icon: "○", label: "Mark", color: "#bbb", bg: "#F5F5F5", border: "#ddd" };
}

function getBadge(pts) {
  if (pts >= 5) return "⭐";
  if (pts >= 3) return "🌟";
  if (pts < 0)  return "⚠️";
  return null;
}
function getPointColor(pts) {
  return pts > 0 ? "#2E7D5E" : pts < 0 ? "#C0392B" : "#888";
}
function getCardBg(pts) {
  return pts >= 5 ? "#FFF8E7" : pts < 0 ? "#FFF1F1" : "#FFFFFF";
}

// ─── REPORT GENERATION ─────────────────────────────────────────────────────
function generateReport(period, students, dateRange) {
  const pc = PERIOD_COLORS[period];
  const presentStudents = students.filter(s => s.log.length > 0 || s.attendance === "present");
  const totalDays = 1; // Could be extended for multi-day tracking
  
  const reportData = students.map(s => {
    const positiveLog = s.log.filter(l => l.pts > 0);
    const negativeLog = s.log.filter(l => l.pts < 0);
    const topCats = CATEGORIES
      .filter(c => c.points > 0)
      .map(c => ({ ...c, count: s.log.filter(l => l.label === c.label).length }))
      .filter(c => c.count > 0)
      .sort((a, b) => b.count - a.count);
    return { ...s, positiveLog, negativeLog, topCats };
  });

  return { period, pc, reportData, dateRange };
}

// ─── PRINT HTML BUILDER (outside React) ────────────────────────────────────
function buildPrintHTML(allPeriodData, selectedPeriod, reportMode, teacherName, className, dateLabel, singleStudent) {
  const periodsData = selectedPeriod === "ALL" ? PERIODS : [selectedPeriod];
  const studentRows = periodsData.flatMap(function(period) {
    const pStudents = allPeriodData[period] || [];
    const pc = PERIOD_COLORS[period];
    const targets = singleStudent
      ? pStudents.filter(function(s) { return s.name === singleStudent.name && period === singleStudent.period; })
      : pStudents;
    return targets.map(function(s) { return { s: s, period: period, pc: pc }; });
  });

  const cards = studentRows.map(function(row) {
    const s = row.s, period = row.period, pc = row.pc;
    const att = getAttendanceMeta(s.attendance);
    const initials = s.name.split(" ").map(function(n) { return n[0]; }).join("").slice(0,2).toUpperCase();
    const ptColor = s.points > 0 ? "#2E7D5E" : s.points < 0 ? "#C0392B" : "#888";
    const ptStr = (s.points > 0 ? "+" : "") + s.points;

    const catRows = CATEGORIES.filter(function(c) {
      return s.log.some(function(l) { return l.label === c.label; });
    }).map(function(cat) {
      const count = s.log.filter(function(l) { return l.label === cat.label; }).length;
      const ptVal = (cat.points > 0 ? "+" : "") + (cat.points * count);
      const ptC = cat.points > 0 ? "#2E7D5E" : "#C0392B";
      return '<div style="display:flex;gap:8px;margin-bottom:5px;align-items:center">'
        + '<span>' + cat.emoji + '</span>'
        + '<span style="font-size:11px;color:#555;flex:1">' + cat.label + '</span>'
        + '<span style="font-size:11px;font-weight:700;color:' + ptC + '">' + ptVal + '</span>'
        + '</div>';
    }).join("");

    const logRows = reportMode === "full" ? s.log.slice(0,8).map(function(e) {
      const ec = e.pts > 0 ? "#2E7D5E" : "#C0392B";
      const ep = (e.pts > 0 ? "+" : "") + e.pts;
      return '<div style="display:flex;gap:6px;padding:2px 0;font-size:11px;border-bottom:1px solid #f5f5f5">'
        + '<span>' + e.emoji + '</span>'
        + '<span style="flex:1;color:#555">' + e.label + '</span>'
        + '<span style="color:' + ec + ';font-weight:700">' + ep + '</span>'
        + '<span style="color:#bbb;font-size:10px">' + e.time + '</span>'
        + '</div>';
    }).join("") : "";

    const msg = s.points >= 5 ? "Outstanding participation! " + s.name + " has been an excellent contributor."
      : s.points >= 3 ? s.name + " showed strong engagement and made meaningful contributions."
      : s.points >= 1 ? s.name + " participated actively in class activities."
      : s.points === 0 ? s.name + " attended class. Encouraging more participation would be beneficial."
      : s.name + " had some challenges with participation this period.";

    const totalPts = (s.totalPoints || 0) + s.points;
    const histDisplayed = reportMode === "full" ? (s.history || []) : (s.history || []).slice(0, 3);
    const historyRows = histDisplayed.map(function(day) {
      const dayPtColor = day.points > 0 ? "#2E7D5E" : day.points < 0 ? "#C0392B" : "#888";
      const dayPts = (day.points > 0 ? "+" : "") + day.points;
      const attendedCats = CATEGORIES.filter(function(c) {
        return (day.log || []).some(function(l) { return l.label === c.label; });
      });
      if (reportMode === "full") {
        var actLines = attendedCats.filter(function(c) { return c.id !== "offtask"; }).map(function(cat) {
          var count = (day.log || []).filter(function(l) { return l.label === cat.label; }).length;
          return cat.label + (count > 1 ? " (" + count + "x)" : "");
        });
        var offTask = (day.log || []).filter(function(l) { return l.label === "Off-Task Talking"; }).length;
        var offTaskStr = offTask > 0 ? (offTask > 1 ? "Off-Task Talking (" + offTask + "x)" : "Off-Task Talking") : "";
        var actText = actLines.join(", ") + (offTaskStr ? (actLines.length > 0 ? " · " : "") + offTaskStr : "");
        var attLabel = day.attendance === "present" ? "Present" : "Absent";
        var attColor = day.attendance === "present" ? "#4C9B82" : "#E05C5C";
        return '<div style="padding:6px 0;border-bottom:1px solid #f0f0f0">'
          + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">'
            + '<span style="font-weight:600;font-size:11px;color:#333">' + day.date + '</span>'
            + '<div style="display:flex;align-items:center;gap:10px">'
              + '<span style="font-size:11px;color:' + attColor + ';font-weight:600">' + attLabel + '</span>'
              + '<span style="font-weight:700;color:' + dayPtColor + ';font-size:12px">' + dayPts + ' pts</span>'
            + '</div>'
          + '</div>'
          + '<div style="font-size:11px;color:' + (actText ? "#555" : "#bbb") + ';line-height:1.5">' + (actText || "No participation recorded") + '</div>'
          + '</div>';
      } else {
        var dayAtt = day.attendance === "present" ? "✅" : "❌";
        var dayCats = attendedCats.map(function(c) { return c.emoji; }).join(" ");
        return '<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid #f0f0f0;font-size:11px">'
          + '<span style="color:#999;min-width:68px;font-size:10px;flex-shrink:0">' + day.date + '</span>'
          + '<span style="font-size:12px">' + dayAtt + '</span>'
          + '<span style="flex:1;color:#888;font-size:12px;letter-spacing:2px">' + (dayCats || "—") + '</span>'
          + '<span style="font-weight:700;color:' + dayPtColor + ';min-width:28px;text-align:right">' + dayPts + '</span>'
          + '</div>';
      }
    }).join("");

    const totalDays = (s.history||[]).length + (s.points !== 0 ? 1 : 0);
    const totalRow = reportMode === "full" && (s.history||[]).length > 0
      ? '<div style="display:flex;justify-content:space-between;padding:8px 0 0;font-size:12px;font-weight:700;border-top:1px solid #E8EBF0;margin-top:4px"><span style="color:#555">Cumulative total (' + totalDays + ' days)</span><span style="color:#9B6DD1">' + totalPts + ' pts</span></div>'
      : "";

    const histLabel = reportMode === "full"
      ? 'History (' + (s.history||[]).length + ' days)'
      : 'Recent History (last ' + histDisplayed.length + ' of ' + (s.history||[]).length + ' days)';

    const historySection = (s.history || []).length > 0
      ? '<div style="border-top:2px solid #E8EBF0;margin-top:10px;padding-top:8px">'
        + '<div style="font-size:10px;font-weight:700;color:#9B6DD1;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">📅 ' + histLabel + '</div>'
        + historyRows + totalRow
        + '</div>'
      : "";

    const noActivity = s.log.length === 0 ? '<div style="font-size:12px;color:#bbb;text-align:center;padding:8px">No activity today</div>' : "";
    const msgHTML = reportMode === "full" && s.log.length > 0 ? '<div style="background:#F8F9FC;border-radius:6px;padding:8px;font-size:11px;color:#555;line-height:1.5;margin-bottom:8px">' + msg + '</div>' : "";
    const logSection = reportMode === "full" && s.log.length > 0 ? '<div style="border-top:1px solid #F0F2F6;padding-top:8px;margin-top:6px"><div style="font-size:9px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Activity Log</div>' + logRows + '</div>' : "";
    const noteHTML = s.parentNote ? '<div style="background:#FFFBEA;border:1px solid #FFD166;border-radius:6px;padding:6px 10px;font-size:11px;color:#7A5200;margin-top:8px"><b>Note:</b> ' + s.parentNote + '</div>' : "";

    return '<div style="background:white;border:1.5px solid #E8EBF0;border-radius:10px;overflow:hidden;page-break-inside:avoid;break-inside:avoid;margin-bottom:4px">'
      + '<div style="background:' + pc.bg + ';padding:10px 14px;display:flex;align-items:center;justify-content:space-between">'
        + '<div style="display:flex;align-items:center;gap:10px">'
          + '<div style="width:34px;height:34px;border-radius:50%;background:' + pc.accent + ';color:white;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700">' + initials + '</div>'
          + '<div>'
            + '<div style="font-weight:700;font-size:14px;color:' + pc.text + '">' + s.name + '</div>'
            + '<div style="font-size:11px;color:' + pc.accent + '">' + period + ' · ' + att.icon + ' ' + att.label + '</div>'
          + '</div>'
        + '</div>'
        + '<div style="text-align:right">'
          + '<div style="font-size:22px;font-weight:800;color:' + ptColor + '">' + ptStr + '</div>'
          + '<div style="font-size:9px;color:#aaa">today</div>'
          + '<div style="font-size:13px;font-weight:700;color:#9B6DD1">' + totalPts + ' total</div>'
        + '</div>'
      + '</div>'
      + '<div style="padding:10px 14px">' + noActivity + catRows + msgHTML + logSection + historySection + noteHTML + '</div>'
      + '<div style="background:#F8F9FC;border-top:1px solid #F0F2F6;padding:6px 14px;display:flex;justify-content:space-between">'
        + '<span style="font-size:10px;color:#bbb">' + (s.history || []).length + ' days tracked</span>'
        + '<span style="font-size:10px;color:#bbb">' + className + ' · ' + period + '</span>'
      + '</div>'
      + '</div>';
  }).join("");

  return '<h1 style="font-size:20px;font-weight:800;margin:0 0 4px">' + className + ' — Participation Reports</h1>'
    + '<div style="font-size:13px;color:#888;margin-bottom:20px">' + teacherName + ' · ' + dateLabel + '</div>'
    + '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px">' + cards + '</div>';
}

// ─── PARENT REPORT MODAL ───────────────────────────────────────────────────
function ParentReportModal({ allPeriodData, onClose, onPrint }) {
  const [selectedPeriod, setSelectedPeriod] = useState("ALL");
  const [reportMode, setReportMode] = useState("summary");
  const [dateLabel, setDateLabel] = useState(`Week of ${getTodayStr()}`);
  const [teacherName, setTeacherName] = useState("Ms. Lin");
  const [className, setClassName] = useState("Algebra 2");
  const reportRef = useRef(null);

  const periodsToShow = selectedPeriod === "ALL" ? PERIODS : [selectedPeriod];

  const getStudentSummary = (s, period) => {
    if (s.log.length === 0) return null;
    const positives = s.log.filter(l => l.pts > 0);
    const negatives = s.log.filter(l => l.pts < 0);
    const topCat = CATEGORIES
      .filter(c => c.points > 0)
      .map(c => ({ ...c, count: s.log.filter(l => l.label === c.label).length }))
      .filter(c => c.count > 0)
      .sort((a, b) => b.count - a.count)[0];
    return { positives, negatives, topCat };
  };

  const getStarMessage = (s) => {
    if (s.points >= 5) return "Outstanding participation this period! " + s.name + " has been an excellent contributor to class discussions.";
    if (s.points >= 3) return s.name + " showed strong engagement and made meaningful contributions to class.";
    if (s.points >= 1) return s.name + " participated actively in class activities.";
    if (s.points === 0) return s.name + " attended class. Encouraging more participation would be beneficial.";
    if (s.points < 0) return s.name + " had some challenges with class participation. We encourage focusing on engagement strategies at home.";
    return "";
  };

  return (
    <div style={{ position:"fixed", inset:0, zIndex:2000, overflowY:"auto", background:"rgba(0,0,0,0.6)" }} onClick={onClose}>
      <div style={{ fontFamily:"'Segoe UI',system-ui,sans-serif", minHeight:"100vh", background:"#F0F2F6" }} onClick={e => e.stopPropagation()}>
      {/* Report Header */}
      <div style={{ background:"linear-gradient(135deg,#1A1A2E 0%,#16213E 100%)", color:"white", padding:"16px 20px", display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:10 }}>
        <div>
          <div style={{ fontSize:10, letterSpacing:3, textTransform:"uppercase", color:"#7EC8A4", fontWeight:600 }}>Reports</div>
          <h2 style={{ margin:0, fontSize:20, fontWeight:700 }}>Parent Communication Reports</h2>
        </div>
        <button onClick={onClose} style={{ background:"rgba(255,255,255,0.15)", color:"white", border:"1px solid rgba(255,255,255,0.3)", borderRadius:8, padding:"8px 18px", cursor:"pointer", fontSize:14, fontWeight:600 }}>✕ Close</button>
      </div>

      {/* Controls */}
      <div style={{ background:"white", borderBottom:"1px solid #E8EBF0", padding:"14px 20px", display:"flex", gap:12, flexWrap:"wrap", alignItems:"flex-end" }}>
        <div>
          <label style={{ fontSize:11, fontWeight:700, color:"#666", display:"block", marginBottom:4 }}>PERIOD</label>
          <select value={selectedPeriod} onChange={e => setSelectedPeriod(e.target.value)}
            style={{ padding:"8px 12px", border:"2px solid #E0E4EC", borderRadius:8, fontSize:14, background:"white", cursor:"pointer" }}>
            <option value="ALL">All Periods</option>
            {PERIODS.map(p => <option key={p} value={p}>{p}</option>)}
          </select>
        </div>
        <div>
          <label style={{ fontSize:11, fontWeight:700, color:"#666", display:"block", marginBottom:4 }}>DATE</label>
          <input value={dateLabel} onChange={e => setDateLabel(e.target.value)}
            style={{ padding:"8px 12px", border:"2px solid #E0E4EC", borderRadius:8, fontSize:14, width:200 }} />
        </div>
        <div>
          <label style={{ fontSize:11, fontWeight:700, color:"#666", display:"block", marginBottom:4 }}>TEACHER</label>
          <input value={teacherName} onChange={e => setTeacherName(e.target.value)}
            style={{ padding:"8px 12px", border:"2px solid #E0E4EC", borderRadius:8, fontSize:14, width:150 }} />
        </div>
        <div>
          <label style={{ fontSize:11, fontWeight:700, color:"#666", display:"block", marginBottom:4 }}>CLASS</label>
          <input value={className} onChange={e => setClassName(e.target.value)}
            style={{ padding:"8px 12px", border:"2px solid #E0E4EC", borderRadius:8, fontSize:14, width:130 }} />
        </div>
        <div>
          <label style={{ fontSize:11, fontWeight:700, color:"#666", display:"block", marginBottom:4 }}>STYLE</label>
          <div style={{ display:"flex", gap:4 }}>
            {["summary","full"].map(m => (
              <button key={m} onClick={() => setReportMode(m)}
                style={{ background:reportMode===m?"#1A1A2E":"white", color:reportMode===m?"white":"#555", border:"2px solid "+(reportMode===m?"#1A1A2E":"#ddd"), borderRadius:8, padding:"7px 14px", fontSize:13, cursor:"pointer", fontWeight:reportMode===m?700:400 }}>
                {m === "summary" ? "Summary" : "Full Detail"}
              </button>
            ))}
          </div>
        </div>
        <button
          onClick={() => {
            const html = buildPrintHTML(allPeriodData, selectedPeriod, reportMode, teacherName, className, dateLabel, null);
            onPrint(html);
          }}
          style={{ background:"#4C9B82", color:"white", border:"none", borderRadius:8, padding:"9px 20px", fontSize:14, fontWeight:700, cursor:"pointer" }}>
          🖨️ Print / Save PDF
        </button>
      </div>

        {/* Report Preview */}
        <div ref={reportRef} style={{ padding:24 }}>
          {/* Print header */}
          <div className="print-only" style={{ textAlign:"center", marginBottom:24, paddingBottom:16, borderBottom:"2px solid #eee" }}>
            <div style={{ fontSize:22, fontWeight:800, color:"#1A1A2E" }}>{className} — Participation Reports</div>
            <div style={{ fontSize:14, color:"#888", marginTop:4 }}>{teacherName} · {dateLabel}</div>
          </div>

          {periodsToShow.map(period => {
            const students = allPeriodData[period] || [];
            const pc = PERIOD_COLORS[period];
            const activeStudents = students.filter(s => s.log.length > 0 || s.attendance === "present");
            
            if (activeStudents.length === 0) {
              return (
                <div key={period} style={{ marginBottom:24, padding:20, border:"2px dashed #E0E4EC", borderRadius:12, textAlign:"center", color:"#aaa" }}>
                  <div style={{ fontSize:16, fontWeight:700, color:"#999" }}>{period} — No data recorded yet</div>
                  <div style={{ fontSize:13, marginTop:4 }}>Mark attendance and award points to generate reports.</div>
                </div>
              );
            }

            return (
              <div key={period} style={{ marginBottom:32 }}>
                {/* Period header */}
                <div style={{ background: pc.bg, border:`2px solid ${pc.accent}40`, borderRadius:12, padding:"12px 18px", marginBottom:16, display:"flex", alignItems:"center", gap:12 }}>
                  <div style={{ background:pc.accent, color:"white", borderRadius:8, padding:"4px 14px", fontSize:15, fontWeight:800 }}>{period}</div>
                  <div style={{ fontSize:14, fontWeight:700, color:pc.text }}>{className}</div>
                  <div style={{ fontSize:13, color:pc.text, opacity:0.7 }}>·</div>
                  <div style={{ fontSize:13, color:pc.text, opacity:0.7 }}>{teacherName}</div>
                  <div style={{ marginLeft:"auto", fontSize:13, color:pc.text, opacity:0.8 }}>{dateLabel}</div>
                </div>

                {/* Student cards grid */}
                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(260px, 1fr))", gap:12 }}>
                  {students.map((s, i) => {
                    const summary = getStudentSummary(s, period);
                    const starMsg = getStarMessage(s);
                    const att = getAttendanceMeta(s.attendance);
                    return (
                      <div key={i} className="report-card" style={{ background:"white", border:"1.5px solid #E8EBF0", borderRadius:12, overflow:"hidden", boxShadow:"0 2px 8px rgba(0,0,0,0.06)" }}>
                        {/* Card top strip */}
                        <div style={{ background:pc.bg, padding:"10px 14px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                            <div style={{ width:36, height:36, borderRadius:"50%", background:pc.accent, color:"white", display:"flex", alignItems:"center", justifyContent:"center", fontSize:14, fontWeight:700 }}>
                              {s.name.split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase()}
                            </div>
                            <div>
                              <div style={{ fontWeight:700, fontSize:14, color:pc.text }}>{s.name}</div>
                              <div style={{ fontSize:11, color:pc.accent }}>{period} · {att.icon} {att.label}</div>
                            </div>
                          </div>
                          <div style={{ textAlign:"right" }}>
                            <div style={{ fontSize:22, fontWeight:800, color:getPointColor(s.points), lineHeight:1 }}>
                              {s.points > 0 ? "+" : ""}{s.points}
                            </div>
                            <div style={{ fontSize:9, color:"#aaa" }}>today</div>
                            <div style={{ fontSize:13, fontWeight:700, color:"#9B6DD1" }}>{(s.totalPoints||0) + s.points} total</div>
                          </div>
                        </div>

                        {/* Activity breakdown */}
                        <div style={{ padding:"10px 14px" }}>
                          {s.log.length === 0 ? (
                            <div style={{ fontSize:12, color:"#bbb", textAlign:"center", padding:"8px 0" }}>No activity recorded</div>
                          ) : (
                            <>
                              {/* Category bars */}
                              <div style={{ marginBottom:8 }}>
                                {CATEGORIES.filter(c => s.log.some(l => l.label === c.label)).map(cat => {
                                  const count = s.log.filter(l => l.label === cat.label).length;
                                  const catPtColor = cat.points > 0 ? "#2E7D5E" : "#C0392B";
                                  return (
                                    <div key={cat.id} style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4 }}>
                                      <div style={{ width:16, height:16, borderRadius:4, background:cat.color, display:"flex", alignItems:"center", justifyContent:"center", fontSize:9, flexShrink:0 }}>
                                        {cat.emoji}
                                      </div>
                                      <div style={{ fontSize:11, color:"#555", flex:1, minWidth:0 }} title={cat.label}>{cat.label}</div>
                                      <div style={{ display:"flex", gap:2 }}>
                                        {Array.from({length:Math.min(count,5)}).map((_,ci) => (
                                          <div key={ci} style={{ width:10, height:10, borderRadius:2, background:cat.color, opacity:0.85 }} />
                                        ))}
                                        {count > 5 && <span style={{ fontSize:10, color:cat.color, fontWeight:700 }}>+{count-5}</span>}
                                      </div>
                                      <div style={{ fontSize:11, fontWeight:700, color:catPtColor, minWidth:24, textAlign:"right" }}>
                                        {cat.points > 0 ? "+" : ""}{cat.points * count}
                                      </div>
                                    </div>
                                  );
                                })}
                              </div>

                              {/* Summary message */}
                              {reportMode === "full" && (
                                <div style={{ background:"#F8F9FC", borderRadius:8, padding:"8px 10px", fontSize:11, color:"#555", lineHeight:1.5, marginBottom:8 }}>
                                  {starMsg}
                                </div>
                              )}

                              {/* Full log (detail mode) */}
                              {reportMode === "full" && s.log.length > 0 && (
                                <div style={{ borderTop:"1px solid #F0F2F6", paddingTop:8 }}>
                                  <div style={{ fontSize:10, fontWeight:700, color:"#aaa", textTransform:"uppercase", letterSpacing:1, marginBottom:4 }}>Activity Log</div>
                                  {s.log.slice(0,8).map((entry, ei) => {
                                      const entryColor = entry.pts > 0 ? "#2E7D5E" : "#C0392B";
                                      const entryPts = entry.pts > 0 ? "+" + entry.pts : "" + entry.pts;
                                      return (
                                    <div key={ei} style={{ display:"flex", alignItems:"center", gap:6, padding:"2px 0", fontSize:11 }}>
                                      <span>{entry.emoji}</span>
                                      <span style={{ flex:1, color:"#555" }}>{entry.label}</span>
                                      <span style={{ color:entryColor, fontWeight:700 }}>{entryPts}</span>
                                      <span style={{ color:"#bbb", fontSize:10 }}>{entry.time}</span>
                                    </div>
                                      );
                                  })}
                                </div>
                              )}
                            </>
                          )}

                          {/* Teacher note */}
                          {s.parentNote && (
                            <div style={{ background:"#FFFBEA", border:"1px solid #FFD166", borderRadius:8, padding:"6px 10px", fontSize:11, color:"#7A5200", marginTop:8 }}>
                              📝 <strong>Note:</strong> {s.parentNote}
                            </div>
                          )}

                          {/* History — Summary: last 3 days compact icons; Full: all days with full activity descriptions */}
                          {(s.history||[]).length > 0 && (() => {
                            const hist = s.history;
                            const showAll = reportMode === "full";
                            const displayed = showAll ? hist : hist.slice(0, 3);
                            return (
                              <div style={{ borderTop:"2px solid #E8EBF0", marginTop:10, paddingTop:8 }}>
                                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                                  <div style={{ fontSize:10, fontWeight:700, color:"#9B6DD1", textTransform:"uppercase", letterSpacing:1 }}>
                                    📅 History ({hist.length} days)
                                  </div>
                                  {!showAll && hist.length > 3 && (
                                    <div style={{ fontSize:10, color:"#aaa" }}>last 3 shown — Full Detail shows all</div>
                                  )}
                                </div>
                                {displayed.map((day, di) => {
                                  const dayPtColor = day.points > 0 ? "#2E7D5E" : day.points < 0 ? "#C0392B" : "#888";
                                  const dayPts = (day.points > 0 ? "+" : "") + day.points;
                                  const attendedCats = CATEGORIES.filter(c => (day.log||[]).some(l => l.label === c.label));
                                  if (showAll) {
                                    // Full detail: written-out activity descriptions with counts
                                    const actLines = attendedCats.map(c => {
                                      const count = (day.log||[]).filter(l => l.label === c.label).length;
                                      const times = count > 1 ? " (" + count + "x)" : "";
                                      return c.label + times;
                                    });
                                    const offTask = (day.log||[]).filter(l => l.label === "Off-Task Talking").length;
                                    return (
                                      <div key={di} style={{ padding:"6px 0", borderBottom:"1px solid #f0f0f0" }}>
                                        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:3 }}>
                                          <span style={{ fontWeight:600, fontSize:11, color:"#333" }}>{day.date}</span>
                                          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                                            <span style={{ fontSize:11, color: day.attendance === "present" ? "#4C9B82" : "#E05C5C", fontWeight:600 }}>{day.attendance === "present" ? "Present" : "Absent"}</span>
                                            <span style={{ fontWeight:700, color:dayPtColor, fontSize:12 }}>{dayPts} pts</span>
                                          </div>
                                        </div>
                                        {actLines.length > 0 && (
                                          <div style={{ fontSize:11, color:"#555", lineHeight:1.6 }}>
                                            {actLines.filter(l => !l.startsWith("Off-Task")).join(", ")}
                                            {offTask > 0 && <span style={{ color:"#E05C5C" }}>{actLines.filter(l => !l.startsWith("Off-Task")).length > 0 ? " · " : ""}{offTask > 1 ? "Off-Task Talking (" + offTask + "x)" : "Off-Task Talking"}</span>}
                                          </div>
                                        )}
                                        {actLines.length === 0 && day.attendance === "present" && (
                                          <div style={{ fontSize:11, color:"#bbb" }}>No participation recorded</div>
                                        )}
                                      </div>
                                    );
                                  } else {
                                    // Summary: compact icon row
                                    const dayCats = attendedCats.map(c => c.emoji).join(" ");
                                    return (
                                      <div key={di} style={{ display:"flex", alignItems:"center", gap:8, padding:"4px 0", borderBottom:"1px solid #f5f5f5", fontSize:11 }}>
                                        <span style={{ color:"#999", minWidth:68, fontSize:10, flexShrink:0 }}>{day.date}</span>
                                        <span style={{ fontSize:12 }}>{day.attendance === "present" ? "✅" : "❌"}</span>
                                        <span style={{ flex:1, color:"#888", fontSize:12, letterSpacing:2 }}>{dayCats || "—"}</span>
                                        <span style={{ fontWeight:700, color:dayPtColor, minWidth:28, textAlign:"right" }}>{dayPts}</span>
                                      </div>
                                    );
                                  }
                                })}
                                {showAll && hist.length > 0 && (
                                  <div style={{ display:"flex", justifyContent:"space-between", padding:"8px 0 0", fontSize:12, fontWeight:700, borderTop:"1px solid #E8EBF0", marginTop:4 }}>
                                    <span style={{ color:"#555" }}>Cumulative total ({hist.length + (s.points !== 0 ? 1 : 0)} days)</span>
                                    <span style={{ color:"#9B6DD1" }}>{(s.totalPoints||0) + s.points} pts</span>
                                  </div>
                                )}
                              </div>
                            );
                          })()}
                        </div>

                        {/* Bottom strip */}
                        <div style={{ background:"#F8F9FC", borderTop:"1px solid #F0F2F6", padding:"6px 14px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                          <div style={{ fontSize:10, color:"#9B6DD1", fontWeight:700 }}>{(s.history||[]).length} days tracked</div>
                          <button onClick={() => { const html = buildPrintHTML(allPeriodData, selectedPeriod, reportMode, teacherName, className, dateLabel, { name: s.name, period }); if (html) { onPrint(html); onClose(); } }}
                            style={{ background:"none", border:"1px solid #E0E4EC", borderRadius:6, padding:"3px 10px", fontSize:10, color:"#888", cursor:"pointer", fontWeight:600 }}>
                            🖨️ Print this student
                          </button>
                          <div style={{ fontSize:10, color:"#bbb" }}>{className} · {period}</div>
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* Period stats */}
                <div style={{ marginTop:12, display:"flex", gap:10, flexWrap:"wrap" }}>
                  {[
                    { label:"Present", val: students.filter(s=>s.attendance==="present").length, color:"#4C9B82" },
                    { label:"Absent",  val: students.filter(s=>s.attendance==="absent").length,  color:"#E05C5C" },
                    { label:"Avg pts", val: students.length > 0 ? (students.reduce((a,s)=>a+s.points,0)/students.length).toFixed(1) : "0", color:pc.accent },
                    { label:"Top scorer", val: students.sort((a,b)=>b.points-a.points)[0]?.name || "—", color:"#D4A017" },
                  ].map((stat,i) => (
                    <div key={i} style={{ background:"white", border:"1px solid #E8EBF0", borderRadius:8, padding:"6px 14px", display:"flex", gap:8, alignItems:"center", fontSize:13 }}>
                      <span style={{ color:"#888" }}>{stat.label}:</span>
                      <span style={{ fontWeight:700, color:stat.color }}>{stat.val}</span>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}

          {/* Print footer */}
          <div className="print-only" style={{ marginTop:32, paddingTop:16, borderTop:"1px solid #eee", fontSize:11, color:"#aaa", textAlign:"center" }}>
            Generated on {getTodayStr()} · {teacherName} · {className}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ───────────────────────────────────────────────────────────────
function App() {
  const [activePeriod, setActivePeriod] = useState("P1");
  const [allPeriodData, setAllPeriodData] = useState(() => {
    const data = {};
    PERIODS.forEach(p => { data[p] = loadPeriodData(p); });
    return data;
  });
  const [history, setHistory] = useState([]);
  const [selected, setSelected] = useState(null);
  const [popoverPos, setPopoverPos] = useState(null);
  const popoverRef = useRef(null);
  const [newName, setNewName] = useState("");
  const [view, setView] = useState("grid");
  const [showLog, setShowLog] = useState(null);
  const [flashAll, setFlashAll] = useState(null);
  const [resetConfirm, setResetConfirm] = useState(false);
  const [undoToast, setUndoToast] = useState(null);
  const [savedToast, setSavedToast] = useState(false);
  const [showReport, setShowReport] = useState(false);
  const [editNoteFor, setEditNoteFor] = useState(null);
  const [noteText, setNoteText] = useState("");

  const students = allPeriodData[activePeriod] || [];
  const pc = PERIOD_COLORS[activePeriod];

  const setStudents = useCallback((updater) => {
    setAllPeriodData(prev => {
      const current = prev[activePeriod];
      const next = typeof updater === "function" ? updater(current) : updater;
      const updated = { ...prev, [activePeriod]: next };
      savePeriodData(activePeriod, next);
      return updated;
    });
  }, [activePeriod]);

  // Save all periods on change
  useEffect(() => {
    setSavedToast(true);
    const t = setTimeout(() => setSavedToast(false), 1500);
    return () => clearTimeout(t);
  }, [allPeriodData]);

  // Close popover on outside click
  useEffect(() => {
    const handle = (e) => {
      if (popoverRef.current && !popoverRef.current.contains(e.target)) {
        setSelected(null); setPopoverPos(null);
      }
    };
    if (selected !== null) document.addEventListener("mousedown", handle);
    return () => document.removeEventListener("mousedown", handle);
  }, [selected]);

  const snapshot = () => {
    setHistory(h => [...h.slice(-19), { period: activePeriod, data: JSON.parse(JSON.stringify(allPeriodData)) }]);
  };

  const undo = () => {
    if (history.length === 0) return;
    const prev = history[history.length - 1];
    setHistory(h => h.slice(0, -1));
    setAllPeriodData(prev.data);
    PERIODS.forEach(p => savePeriodData(p, prev.data[p]));
    setUndoToast(null);
  };

  const showUndoMsg = (label) => {
    if (undoToast?.timeout) clearTimeout(undoToast.timeout);
    const timeout = setTimeout(() => setUndoToast(null), 4000);
    setUndoToast({ label, timeout });
  };

  const toggleAttendance = (idx) => {
    setStudents(prev => prev.map((s, i) => {
      if (i !== idx) return s;
      const next = s.attendance === "present" ? "absent" : "present";
      return { ...s, attendance: next };
    }));
  };

  const award = (studentIdx, cat) => {
    if (students[studentIdx].attendance !== "present") return;
    snapshot();
    const now = new Date();
    setStudents(prev => prev.map((s, i) => {
      if (i !== studentIdx) return s;
      return {
        ...s,
        points: s.points + cat.points,
        log: [{ label:cat.label, pts:cat.points, emoji:cat.emoji, time:getTimeStr(), date:getShortDateStr() }, ...s.log],
      };
    }));
    showUndoMsg(`${cat.emoji} ${cat.label} → ${students[studentIdx].name}`);
  };

  const [giveAllHistory, setGiveAllHistory] = useState([]); // [{ id, cat, time, date }]

  const awardAll = (cat) => {
    snapshot();
    const time = getTimeStr(); const date = getShortDateStr();
    const batchId = Date.now().toString();
    setStudents(prev => prev.map(s => {
      if (s.attendance !== "present") return s;
      return { ...s, points:s.points+cat.points, log:[{label:cat.label,pts:cat.points,emoji:cat.emoji,time,date,batchId},...s.log] };
    }));
    setGiveAllHistory(prev => [...prev, { id: batchId, cat, time }]);
    showUndoMsg(`${cat.emoji} ${cat.label} → All present`);
    setFlashAll(cat.id);
    setTimeout(() => setFlashAll(null), 800);
  };

  const removeLogEntry = (studentIdx, logIdx) => {
    snapshot();
    setStudents(prev => prev.map((s, i) => {
      if (i !== studentIdx) return s;
      const entry = s.log[logIdx];
      if (!entry) return s;
      return { ...s, points: s.points - entry.pts, log: s.log.filter((_, li) => li !== logIdx) };
    }));
    showUndoMsg(`Removed entry from ${students[studentIdx].name}`);
  };

  const removeLogEntryByBatch = (studentIdx, batchId) => {
    snapshot();
    setStudents(prev => prev.map((s, i) => {
      if (i !== studentIdx) return s;
      const entry = s.log.find(l => l.batchId === batchId);
      if (!entry) return s;
      return { ...s, points: s.points - entry.pts, log: s.log.filter(l => l.batchId !== batchId || l !== entry) };
    }));
  };

  const addStudent = () => {
    const trimmed = newName.trim();
    if (!trimmed) return;
    snapshot();
    setStudents(prev => [...prev, { name:trimmed, points:0, log:[], attendance:"absent", notes:"", parentNote:"", history:[], totalPoints:0 }]);
    setNewName("");
  };

  const removeStudent = (idx) => {
    snapshot();
    setStudents(prev => prev.filter((_,i) => i !== idx));
    if (selected === idx) setSelected(null);
  };

  const [driveStatus, setDriveStatus] = useState(() => localStorage.getItem("pt_drive_token") ? "connected" : "idle"); // idle | connecting | connected | saving | loading | error
  const [driveMsg, setDriveMsg] = useState("");
  const [showDriveSetup, setShowDriveSetup] = useState(false);
  const [driveClientId, setDriveClientId] = useState(() => localStorage.getItem("pt_drive_client_id") || "");
  const [driveClientIdInput, setDriveClientIdInput] = useState("");

  const getDriveToken = () => localStorage.getItem("pt_drive_token");
  const getDriveFileId = () => localStorage.getItem("pt_drive_file_id");

  const connectDrive = () => {
    const clientId = driveClientId || localStorage.getItem("pt_drive_client_id");
    if (!clientId) { setShowDriveSetup(true); return; }
    setDriveStatus("connecting");
    window._driveCallback = (token) => {
      localStorage.setItem("pt_drive_token", token);
      setDriveStatus("connected");
      setDriveMsg("Connected! Saving now…");
      setTimeout(() => saveToDrive(token), 300);
    };
    const url = "https://accounts.google.com/o/oauth2/v2/auth"
      + "?client_id=" + clientId
      + "&redirect_uri=" + encodeURIComponent(window.location.href.split("?")[0])
      + "&response_type=token"
      + "&scope=" + encodeURIComponent("https://www.googleapis.com/auth/drive.file")
      + "&prompt=consent";
    const w = window.open(url, "driveAuth", "width=500,height=600");
    const check = setInterval(() => {
      try {
        if (w && w.location && w.location.href.includes("access_token")) {
          const hash = w.location.hash;
          const params = new URLSearchParams(hash.replace("#",""));
          const token = params.get("access_token");
          if (token) {
            clearInterval(check);
            w.close();
            localStorage.setItem("pt_drive_token", token);
            setDriveStatus("connected");
            setDriveMsg("Connected! Saving now…");
            setTimeout(() => saveToDrive(token), 300);
          }
        }
      } catch(e) {}
      if (w && w.closed) clearInterval(check);
    }, 500);
  };

  const saveToDrive = (token) => {
    const t = token || getDriveToken();
    if (!t) { connectDrive(); return; }
    setDriveStatus("saving");
    setDriveMsg("Saving to Drive…");
    const payload = JSON.stringify({ version:1, exported: new Date().toISOString(), periods: allPeriodData });
    const fileId = getDriveFileId();
    const doSave = (id) => {
      const method = id ? "PATCH" : "POST";
      const url = id
        ? "https://www.googleapis.com/upload/drive/v3/files/" + id + "?uploadType=multipart"
        : "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart";
      const meta = JSON.stringify({ name: "participation-tracker-data.json", mimeType: "application/json" });
      const boundary = "pt_boundary_123";
      const body = "--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" + meta
        + "\r\n--" + boundary + "\r\nContent-Type: application/json\r\n\r\n" + payload
        + "\r\n--" + boundary + "--";
      fetch(url, { method, headers: { "Authorization": "Bearer " + t, "Content-Type": "multipart/related; boundary=" + boundary }, body })
        .then(r => r.json())
        .then(res => {
          if (res.id) {
            localStorage.setItem("pt_drive_file_id", res.id);
            setDriveStatus("connected");
            setDriveMsg("✓ Saved to Google Drive — " + new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"}));
          } else if (res.error && res.error.code === 401) {
            localStorage.removeItem("pt_drive_token");
            setDriveStatus("idle");
            setDriveMsg("Session expired — reconnect");
          } else {
            setDriveStatus("error");
            setDriveMsg("Save failed: " + (res.error && res.error.message || "unknown error"));
          }
        })
        .catch(() => { setDriveStatus("error"); setDriveMsg("Network error — check connection"); });
    };
    if (!fileId) {
      // Search for existing file first
      fetch("https://www.googleapis.com/drive/v3/files?q=name%3D'participation-tracker-data.json'%20and%20trashed%3Dfalse&fields=files(id)", {
        headers: { "Authorization": "Bearer " + t }
      }).then(r => r.json()).then(res => {
        if (res.files && res.files.length > 0) {
          localStorage.setItem("pt_drive_file_id", res.files[0].id);
          doSave(res.files[0].id);
        } else { doSave(null); }
      }).catch(() => doSave(null));
    } else { doSave(fileId); }
  };

  const loadFromDrive = () => {
    const t = getDriveToken();
    if (!t) { connectDrive(); return; }
    const fileId = getDriveFileId();
    if (!fileId) { setDriveMsg("No saved file found. Save first."); return; }
    setDriveStatus("loading");
    setDriveMsg("Loading from Drive…");
    fetch("https://www.googleapis.com/drive/v3/files/" + fileId + "?alt=media", {
      headers: { "Authorization": "Bearer " + t }
    }).then(r => r.json()).then(data => {
      const periods = data.periods || data;
      snapshot();
      const newData = {};
      PERIODS.forEach(p => { newData[p] = periods[p] || allPeriodData[p]; savePeriodData(p, newData[p]); });
      setAllPeriodData(newData);
      setDriveStatus("connected");
      setDriveMsg("✓ Loaded from Google Drive!");
      showUndoMsg("Data loaded from Drive");
    }).catch(() => { setDriveStatus("error"); setDriveMsg("Load failed — try reconnecting"); });
  };

  const saveDriveClientId = () => {
    localStorage.setItem("pt_drive_client_id", driveClientIdInput);
    setDriveClientId(driveClientIdInput);
    setShowDriveSetup(false);
    setTimeout(connectDrive, 100);
  };

  // Auto-save to Drive on End Day if connected
  const endDay = () => {
    snapshot();
    const today = getTodayStr();
    setStudents(prev => prev.map(s => {
      const dayRecord = { date: today, points: s.points, log: s.log, attendance: s.attendance };
      const newHistory = [dayRecord, ...(s.history || [])];
      const newTotal = newHistory.reduce(function(sum, day) { return sum + (day.points || 0); }, 0);
      return { ...s, points: 0, log: [], history: newHistory, totalPoints: newTotal };
    }));
    setSelected(null); setResetConfirm(false);
    setGiveAllHistory([]);
    showUndoMsg("Day saved — points archived");
    if (getDriveToken()) setTimeout(() => saveToDrive(), 500);
  };

  const resetAll = () => {
    snapshot();
    setStudents(prev => prev.map(s => ({ ...s, points:0, log:[], history:[], totalPoints:0 })));
    setSelected(null); setResetConfirm(false);
    setGiveAllHistory([]);
    showUndoMsg("All data cleared");
  };

  const saveNote = () => {
    if (editNoteFor === null) return;
    setStudents(prev => prev.map((s,i) => i === editNoteFor ? { ...s, parentNote: noteText } : s));
    setEditNoteFor(null); setNoteText("");
  };

  const [sheetsUrl, setSheetsUrl] = useState(() => localStorage.getItem("pt_sheets_url") || "");
  const [sheetsToast, setSheetsToast] = useState(null);
  const [showSheetsSetup, setShowSheetsSetup] = useState(false);
  const [sheetsUrlInput, setSheetsUrlInput] = useState("");

  const exportToSheets = () => {
    if (!sheetsUrl) { setShowSheetsSetup(true); setSheetsUrlInput(""); return; }
    const rows = [["Period","Student","Total Points","Today Pts","Attendance","Days Tracked","Date Exported"]];
    PERIODS.forEach(p => {
      const pStudents = allPeriodData[p] || [];
      pStudents.forEach(s => {
        rows.push([p, s.name, (s.totalPoints||0)+s.points, s.points, s.attendance, (s.history||[]).length, new Date().toLocaleDateString()]);
      });
      // History rows
      pStudents.forEach(s => {
        (s.history||[]).forEach(day => {
          rows.push([p, s.name, "", day.points, day.attendance, "", day.date]);
        });
      });
    });
    const url = sheetsUrl + "?data=" + encodeURIComponent(JSON.stringify(rows));
    setSheetsToast({ msg: "Sending to Sheets…", ok: null });
    fetch(url, { mode:"no-cors" })
      .then(() => setSheetsToast({ msg: "✓ Sent to Google Sheets!", ok: true }))
      .catch(() => setSheetsToast({ msg: "✓ Sent! (no-cors — check your sheet)", ok: true }));
    setTimeout(() => setSheetsToast(null), 4000);
  };

  const saveSheetsUrl = () => {
    localStorage.setItem("pt_sheets_url", sheetsUrlInput);
    setSheetsUrl(sheetsUrlInput);
    setShowSheetsSetup(false);
    showUndoMsg("Google Sheets URL saved");
  };

  const exportData = () => {
    const payload = { version: 1, exported: new Date().toISOString(), periods: allPeriodData };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "participation-data-" + new Date().toLocaleDateString("en-US").replace(/\//g,"-") + ".json";
    a.click();
    URL.revokeObjectURL(url);
  };

  const importData = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        const data = parsed.periods || parsed;
        snapshot();
        const newData = {};
        PERIODS.forEach(p => {
          if (data[p]) {
            newData[p] = data[p];
            savePeriodData(p, data[p]);
          } else {
            newData[p] = allPeriodData[p];
          }
        });
        setAllPeriodData(newData);
        showUndoMsg("Data imported successfully");
      } catch(err) {
        alert("Could not read file. Make sure it's a valid export file.");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  // Cross-period summary for header badges
  const periodSummary = PERIODS.map(p => {
    const d = allPeriodData[p] || [];
    return { p, present: d.filter(s=>s.attendance==="present").length, total:d.length, pts:d.reduce((a,s)=>a+s.points,0), total_pts:d.reduce((a,s)=>a+(s.totalPoints||0)+s.points,0) };
  });

  const sorted = [...students].map((s,i) => ({ ...s, origIdx:i })).sort((a,b) => b.points - a.points);

  return (
    <div style={{ fontFamily:"'Segoe UI',system-ui,sans-serif", minHeight:"100vh", background:"#F0F2F6" }}>

      {/* ── Top Header ── */}
      <div className="no-print" style={{ background:"linear-gradient(135deg,#1A1A2E 0%,#16213E 100%)", color:"white", padding:"16px 20px 0" }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:10, marginBottom:12 }}>
          <div>
            <div style={{ fontSize:10, letterSpacing:3, textTransform:"uppercase", color:"#7EC8A4", fontWeight:600 }}>Classroom Tool</div>
            <h1 style={{ margin:0, fontSize:20, fontWeight:700, letterSpacing:-0.5 }}>Participation Tracker</h1>
            <div style={{ fontSize:10, color: savedToast ? "#7EC8A4" : "rgba(255,255,255,0.25)", marginTop:2, transition:"color 0.3s" }}>
              {savedToast ? "✓ All periods saved" : "Auto-saves per period"}
            </div>
          </div>
          <div style={{ display:"flex", gap:8, flexWrap:"wrap", alignItems:"center" }}>
            <div style={{ background:"rgba(255,255,255,0.08)", borderRadius:8, padding:"4px 6px", display:"flex", gap:4 }}>
              {["grid","leaderboard"].map(v => (
                <button key={v} onClick={() => setView(v)} style={{ background:view===v?"rgba(255,255,255,0.15)":"transparent", color:"white", border:"none", borderRadius:6, padding:"5px 12px", fontSize:12, cursor:"pointer", fontWeight:view===v?700:400 }}>
                  {v === "grid" ? "🗂 Grid" : "🏆 Rank"}
                </button>
              ))}
            </div>
            <button onClick={() => setShowReport(true)}
              style={{ background:"rgba(76,155,130,0.25)", color:"#7EC8A4", border:"1px solid rgba(76,155,130,0.5)", borderRadius:8, padding:"7px 14px", fontSize:13, fontWeight:700, cursor:"pointer" }}>
              📋 Reports
            </button>
            <button onClick={exportData}
              style={{ background:"rgba(91,141,217,0.25)", color:"#8BB4E8", border:"1px solid rgba(91,141,217,0.5)", borderRadius:8, padding:"7px 14px", fontSize:13, fontWeight:700, cursor:"pointer" }}>
              💾 Save Data
            </button>
            <button onClick={exportToSheets}
              style={{ background:"rgba(52,168,83,0.25)", color:"#6FCF97", border:"1px solid rgba(52,168,83,0.5)", borderRadius:8, padding:"7px 14px", fontSize:13, fontWeight:700, cursor:"pointer" }}>
              📊 Sheets
            </button>
            <button onClick={driveStatus === "connected" ? saveToDrive : connectDrive}
              style={{ background: driveStatus === "connected" ? "rgba(66,133,244,0.25)" : "rgba(255,255,255,0.08)", color: driveStatus === "connected" ? "#8AB4F8" : "rgba(255,255,255,0.6)", border: "1px solid " + (driveStatus === "connected" ? "rgba(66,133,244,0.5)" : "rgba(255,255,255,0.2)"), borderRadius:8, padding:"7px 14px", fontSize:13, fontWeight:700, cursor:"pointer", display:"flex", alignItems:"center", gap:6 }}>
              {driveStatus === "saving" ? "⏳" : driveStatus === "loading" ? "⏳" : driveStatus === "connected" ? "☁️" : "☁️"}
              {driveStatus === "connected" ? "Drive ✓" : driveStatus === "saving" ? "Saving…" : driveStatus === "loading" ? "Loading…" : "Drive"}
            </button>
            {driveStatus === "connected" && (
              <button onClick={loadFromDrive}
                style={{ background:"rgba(66,133,244,0.15)", color:"#8AB4F8", border:"1px solid rgba(66,133,244,0.3)", borderRadius:8, padding:"7px 14px", fontSize:13, fontWeight:700, cursor:"pointer" }}>
                ☁️ Load
              </button>
            )}
            <label style={{ background:"rgba(155,109,209,0.25)", color:"#C4A0E8", border:"1px solid rgba(155,109,209,0.5)", borderRadius:8, padding:"7px 14px", fontSize:13, fontWeight:700, cursor:"pointer" }}>
              📂 Load Data
              <input type="file" accept=".json" onChange={importData} style={{ display:"none" }} />
            </label>
            <button onClick={undo} disabled={history.length===0}
              style={{ background:history.length>0?"rgba(255,209,102,0.2)":"rgba(255,255,255,0.05)", color:history.length>0?"#FFD166":"rgba(255,255,255,0.25)", border:`1px solid ${history.length>0?"#FFD166":"rgba(255,255,255,0.1)"}`, borderRadius:8, padding:"7px 14px", fontSize:13, cursor:history.length>0?"pointer":"default", fontWeight:600 }}>
              ↩ Undo
            </button>
            {resetConfirm ? (
              <div style={{ display:"flex", gap:6, alignItems:"center", background:"rgba(224,92,92,0.2)", border:"1px solid #E05C5C", borderRadius:8, padding:"4px 8px" }}>
                <span style={{ fontSize:11, color:"#FFB3B3" }}>Archive today?</span>
                <button onClick={endDay} style={{ background:"#4C9B82", color:"white", border:"none", borderRadius:6, padding:"4px 10px", fontSize:12, fontWeight:700, cursor:"pointer" }}>✓ End Day</button>
                <button onClick={resetAll} style={{ background:"#E05C5C", color:"white", border:"none", borderRadius:6, padding:"4px 10px", fontSize:12, fontWeight:700, cursor:"pointer" }}>✕ Clear All</button>
                <button onClick={() => setResetConfirm(false)} style={{ background:"rgba(255,255,255,0.1)", color:"white", border:"none", borderRadius:6, padding:"4px 10px", fontSize:12, cursor:"pointer" }}>Cancel</button>
              </div>
            ) : (
              <button onClick={() => setResetConfirm(true)} style={{ background:"rgba(255,255,255,0.08)", color:"rgba(255,255,255,0.7)", border:"1px solid rgba(255,255,255,0.2)", borderRadius:8, padding:"7px 14px", fontSize:13, cursor:"pointer" }}>
                ↺ End Day
              </button>
            )}
          </div>
        </div>

        {/* ── Period Tabs ── */}
        <div style={{ display:"flex", gap:4, overflowX:"auto" }}>
          {PERIODS.map(p => {
            const ps = periodSummary.find(x => x.p === p);
            const ppc = PERIOD_COLORS[p];
            const isActive = p === activePeriod;
            return (
              <button key={p} onClick={() => { setActivePeriod(p); setSelected(null); setPopoverPos(null); setGiveAllHistory([]); }}
                style={{ background: isActive ? "white" : "rgba(255,255,255,0.07)", color: isActive ? ppc.text : "rgba(255,255,255,0.6)", border:"none", borderRadius:"10px 10px 0 0", padding:"10px 16px", fontSize:13, cursor:"pointer", fontWeight:isActive?700:500, position:"relative", transition:"all 0.15s", flexShrink:0, minWidth:80 }}>
                <div style={{ fontWeight:800, fontSize:14 }}>{p}</div>
                <div style={{ fontSize:10, color: isActive ? ppc.accent : "rgba(255,255,255,0.4)", marginTop:1 }}>
                  {ps?.present}/{ps?.total} · <span style={{ color:"#9B6DD1" }}>{ps?.total_pts} total</span>
                </div>
                {isActive && <div style={{ position:"absolute", bottom:0, left:"50%", transform:"translateX(-50%)", width:24, height:3, background:ppc.accent, borderRadius:"2px 2px 0 0" }} />}
              </button>
            );
          })}
        </div>
      </div>

      {/* ── Give All / Legend strip ── */}
      <div className="no-print" style={{ background:"white", borderBottom:"1px solid #E8EBF0", padding:"10px 20px", display:"flex", gap:10, alignItems:"center", flexWrap:"wrap" }}>
        <div style={{ fontSize:12, fontWeight:700, color:"#555", whiteSpace:"nowrap" }}>👥 Give all:</div>
        {CATEGORIES.filter(c => ["entrance","turntalk","offtask"].includes(c.id)).map(cat => (
          <button key={cat.id} onClick={() => awardAll(cat)}
            style={{ background:flashAll===cat.id?cat.color:`${cat.color}18`, color:flashAll===cat.id?"white":cat.color, border:`1.5px solid ${cat.color}`, borderRadius:8, padding:"5px 12px", fontSize:12, fontWeight:700, cursor:"pointer", transition:"all 0.15s" }}>
            {cat.emoji} {cat.label} <span style={{ opacity:0.7 }}>({cat.points>0?"+":""}{cat.points} all)</span>
          </button>
        ))}
        <div style={{ marginLeft:"auto", display:"flex", gap:8, flexWrap:"wrap" }}>
          {CATEGORIES.map(c => (
            <div key={c.id} style={{ display:"flex", alignItems:"center", gap:4, fontSize:11, color:"#888" }}>
              <div style={{ width:7, height:7, borderRadius:"50%", background:c.color }} />
              {c.emoji} <span style={{ color:c.points>0?"#2E7D5E":"#C0392B", fontWeight:700 }}>{c.points>0?"+":""}{c.points}</span>
            </div>
          ))}
        </div>
      </div>

      <div style={{ padding:"16px 20px", maxWidth:1100, margin:"0 auto" }}>

        {/* ── Give All Quick-Undo Panel ── */}
        {giveAllHistory.length > 0 && (
          <div className="no-print" style={{ marginBottom:14 }}>
            {[...giveAllHistory].reverse().map(batch => {
              const remainingCount = students.filter(s => s.log.some(l => l.batchId === batch.id)).length;
              if (remainingCount === 0) return null;
              return (
                <div key={batch.id} style={{ background:"#FFFBEA", border:"1.5px solid #FFD166", borderRadius:12, padding:"10px 14px", marginBottom:8 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8, flexWrap:"wrap" }}>
                    <span style={{ fontSize:13 }}>{batch.cat.emoji}</span>
                    <span style={{ fontSize:12, fontWeight:700, color:"#7A5200" }}>Give All — <em style={{ fontStyle:"normal" }}>{batch.cat.label}</em></span>
                    <span style={{ fontSize:11, color:"#bbb" }}>{batch.time}</span>
                    <span style={{ fontSize:11, color:"#aaa", background:"#FFF3CD", borderRadius:5, padding:"1px 8px", border:"1px solid #FFD166" }}>{remainingCount} remaining</span>
                    <button onClick={() => setGiveAllHistory(prev => prev.filter(b => b.id !== batch.id))}
                      style={{ marginLeft:"auto", background:"none", border:"none", color:"#ccc", fontSize:13, cursor:"pointer", lineHeight:1 }}>✕</button>
                  </div>
                  <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                    {students.map((s, i) => {
                      const hasEntry = s.log.some(l => l.batchId === batch.id);
                      const isAbsent = s.attendance !== "present";
                      if (isAbsent) return null;
                      return (
                        <button key={i}
                          onClick={() => { if (hasEntry) removeLogEntryByBatch(i, batch.id); }}
                          disabled={!hasEntry}
                          style={{
                            background: hasEntry ? "#FFF1F1" : "#F8FCF9",
                            border: `1.5px solid ${hasEntry ? "#E05C5C70" : "#B8DDD0"}`,
                            borderRadius:8, padding:"5px 12px", fontSize:12,
                            cursor: hasEntry ? "pointer" : "default",
                            color: hasEntry ? "#C0392B" : "#7EC8A4",
                            fontWeight:700,
                            display:"flex", alignItems:"center", gap:5,
                            transition:"all 0.15s",
                          }}>
                          <span style={{ fontSize:13 }}>{hasEntry ? "↩" : "✓"}</span>
                          {s.name}
                        </button>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* Attendance + Add row */}
        <div className="no-print" style={{ display:"flex", gap:10, marginBottom:14, flexWrap:"wrap", alignItems:"center" }}>
          <div style={{ background:"white", borderRadius:12, border:"1px solid #E8EBF0", padding:"10px 16px", display:"flex", alignItems:"center", gap:12, flexShrink:0, flex:1 }}>
            <span style={{ fontSize:12, fontWeight:700, color:"#555" }}>📋 {activePeriod} Attendance</span>
            <span style={{ color:"#4C9B82", fontWeight:700, fontSize:13 }}>✅ {students.filter(s=>s.attendance==="present").length}</span>
            <span style={{ color:"#E05C5C", fontWeight:700, fontSize:13 }}>❌ {students.filter(s=>s.attendance!=="present").length}</span>
            <button onClick={() => { snapshot(); setStudents(prev => prev.map(s => ({ ...s, attendance:"present" }))); showUndoMsg("All present"); }}
              style={{ background:`${pc.accent}18`, color:pc.accent, border:`1px solid ${pc.accent}`, borderRadius:8, padding:"4px 12px", fontSize:12, fontWeight:700, cursor:"pointer" }}>
              ✅ All Present
            </button>
            <button onClick={() => { snapshot(); setStudents(prev => prev.map(s => ({ ...s, attendance:"absent" }))); }}
              style={{ background:"#FFF1F1", color:"#E05C5C", border:"1px solid #E05C5C60", borderRadius:8, padding:"4px 12px", fontSize:12, cursor:"pointer" }}>
              Clear
            </button>
          </div>
          <div style={{ display:"flex", gap:8, flexShrink:0 }}>
            <input value={newName} onChange={e => setNewName(e.target.value)}
              onKeyDown={e => e.key==="Enter" && addStudent()}
              placeholder="Add student…"
              style={{ padding:"9px 14px", border:"2px solid #E0E4EC", borderRadius:10, fontSize:13, width:160, outline:"none" }} />
            <button onClick={addStudent} style={{ background:pc.accent, color:"white", border:"none", borderRadius:10, padding:"9px 16px", fontSize:13, fontWeight:700, cursor:"pointer" }}>+ Add</button>
          </div>
        </div>

        {/* ── Grid View ── */}
        {view === "grid" && (
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(155px, 1fr))", gap:10 }}>
            {students.map((s, i) => {
              const badge = getBadge(s.points);
              const att = getAttendanceMeta(s.attendance);
              const flashCat = CATEGORIES.find(c => c.id === flashAll);
              return (
                <div key={i} style={{ background:flashAll?`${flashCat?.color}18`:getCardBg(s.points), border:`2px solid ${flashAll?flashCat?.color:selected===i?pc.accent:"#E8EBF0"}`, borderRadius:12, overflow:"hidden", transition:"all 0.15s", opacity:s.attendance==="absent"?0.65:1, position:"relative" }}>
                  {/* Attendance strip */}
                  <button onClick={e => { e.stopPropagation(); toggleAttendance(i); }}
                    style={{ width:"100%", display:"flex", alignItems:"center", justifyContent:"space-between", padding:"5px 10px", background:att.bg, border:"none", borderBottom:`1px solid ${att.border}30`, cursor:"pointer", fontSize:10, fontWeight:700, color:att.color }}>
                    <span>{att.icon} {att.label}</span>
                    <span style={{ fontSize:9, color:"#ccc" }}>tap</span>
                  </button>
                  {/* Body */}
                  <div onClick={e => {
                    if (s.attendance !== "present") return;
                    if (selected === i) { setSelected(null); setPopoverPos(null); return; }
                    const rect = e.currentTarget.parentElement.getBoundingClientRect();
                    setPopoverPos({ top:rect.top+window.scrollY, left:rect.left, width:rect.width, height:rect.height });
                    setSelected(i);
                  }} style={{ padding:"10px 12px 6px", cursor:s.attendance==="present"?"pointer":"default" }}>
                    {badge && <div style={{ position:"absolute", top:32, right:8, fontSize:13 }}>{badge}</div>}
                    <div style={{ fontSize:12, fontWeight:600, color:"#333", marginBottom:4, paddingRight:16 }}>{s.name}</div>
                    <div style={{ fontSize:28, fontWeight:800, color:getPointColor(s.points), lineHeight:1 }}>
                      {s.points>0?"+":""}{s.points}
                    </div>
                    <div style={{ fontSize:9, color:"#aaa", marginTop:1 }}>today</div>
                    {(s.totalPoints || 0) > 0 && (
                      <div style={{ fontSize:11, fontWeight:700, color:"#9B6DD1", marginTop:3 }}>
                        {(s.totalPoints || 0) + s.points} total
                      </div>
                    )}
                    {s.parentNote && <div style={{ fontSize:9, color:"#D4A017", marginTop:3 }}>📝 has note</div>}
                  </div>
                  {/* Footer */}
                  <div style={{ display:"flex", justifyContent:"space-between", padding:"4px 10px 6px", borderTop:"1px solid #EEE" }}>
                    <button onClick={e => { e.stopPropagation(); setShowLog(showLog===i?null:i); }}
                      style={{ background:"none", border:"none", fontSize:10, color:"#888", cursor:"pointer", padding:0 }}>
                      📋 {s.log.length}
                    </button>
                    <button onClick={e => { e.stopPropagation(); setEditNoteFor(i); setNoteText(s.parentNote||""); }}
                      style={{ background:"none", border:"none", fontSize:10, color:"#D4A017", cursor:"pointer", padding:0 }} title="Add parent note">
                      ✏️
                    </button>
                    <button onClick={e => { e.stopPropagation(); removeStudent(i); }}
                      style={{ background:"none", border:"none", fontSize:10, color:"#ddd", cursor:"pointer", padding:0 }}>✕</button>
                  </div>
                  {showLog === i && s.log.length > 0 && (
                    <div style={{ padding:"0 10px 8px", fontSize:11, color:"#555" }}>
                      <div style={{ fontSize:9, color:"#bbb", textTransform:"uppercase", letterSpacing:1, padding:"4px 0 2px", fontWeight:700 }}>Tap ↩ to remove an entry</div>
                      {s.log.slice(0,6).map((entry,ei) => {
                        const eColor = entry.pts > 0 ? "#2E7D5E" : "#C0392B";
                        const ePts = (entry.pts > 0 ? "+" : "") + entry.pts;
                        return (
                        <div key={ei} style={{ display:"flex", alignItems:"center", gap:4, padding:"3px 0", borderBottom:"1px solid #f0f0f0" }}>
                          <div style={{ flex:1, minWidth:0 }}>
                            <div style={{ display:"flex", justifyContent:"space-between" }}>
                              <span style={{ fontSize:11 }}>{entry.emoji} {entry.label}</span>
                              <span style={{ color:eColor, fontWeight:700 }}>{ePts}</span>
                            </div>
                            <div style={{ color:"#bbb", fontSize:9 }}>{entry.date} · {entry.time}</div>
                          </div>
                          <button
                            onClick={e => { e.stopPropagation(); removeLogEntry(i, ei); }}
                            title="Remove this entry"
                            style={{ background:"#FFF1F1", border:"1px solid #E05C5C60", borderRadius:5, color:"#E05C5C", fontSize:10, fontWeight:700, padding:"2px 6px", cursor:"pointer", flexShrink:0, lineHeight:1.4 }}>
                            ↩
                          </button>
                        </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* ── Leaderboard View ── */}
        {view === "leaderboard" && (
          <div style={{ background:"white", borderRadius:14, overflow:"hidden", boxShadow:"0 4px 20px rgba(0,0,0,0.07)" }}>
            <div style={{ padding:"12px 20px", background:"#F8F9FC", borderBottom:"1px solid #E8EBF0", display:"grid", gridTemplateColumns:"36px 1fr 70px 120px 70px", gap:10, fontSize:10, fontWeight:700, color:"#999", textTransform:"uppercase", letterSpacing:1 }}>
              <div>#</div><div>Student</div><div style={{ textAlign:"center" }}>Events</div><div style={{ textAlign:"center" }}>Attendance</div><div style={{ textAlign:"right" }}>Points</div>
            </div>
            {sorted.map((s, rank) => {
              const medal = rank===0?"🥇":rank===1?"🥈":rank===2?"🥉":null;
              const att = getAttendanceMeta(s.attendance);
              return (
                <div key={s.origIdx} style={{ display:"grid", gridTemplateColumns:"36px 1fr 70px 120px 70px", gap:10, padding:"0 20px", borderBottom:"1px solid #F0F2F6", background:rank<3?"#FAFBFF":"white", alignItems:"center", opacity:s.attendance==="absent"?0.55:1 }}>
                  <div style={{ fontSize:14, textAlign:"center", padding:"12px 0" }}>{medal||<span style={{ color:"#ccc", fontSize:12 }}>{rank+1}</span>}</div>
                  <div style={{ fontWeight:600, fontSize:13, cursor:s.attendance==="present"?"pointer":"default", padding:"12px 0" }}
                    onClick={e => {
                      if (s.attendance !== "present") return;
                      if (selected===s.origIdx) { setSelected(null); setPopoverPos(null); return; }
                      const rect = e.currentTarget.closest("div[style]").getBoundingClientRect();
                      setPopoverPos({ top:rect.top+window.scrollY, left:rect.left, width:rect.width, height:rect.height });
                      setSelected(s.origIdx);
                    }}>
                    {s.name} {getBadge(s.points) && <span style={{ fontSize:12 }}>{getBadge(s.points)}</span>}
                    <span style={{ display:"block", fontSize:9, color:"#aaa", fontWeight:400 }}>{s.attendance==="present"?"tap to award":"mark present first"}</span>
                  </div>
                  <div style={{ textAlign:"center", fontSize:12, color:"#888", padding:"12px 0" }}>{s.log.length}</div>
                  <div style={{ textAlign:"center", padding:"8px 0" }}>
                    <button onClick={() => toggleAttendance(s.origIdx)}
                      style={{ background:att.bg, border:`1px solid ${att.border}`, borderRadius:8, padding:"4px 10px", fontSize:11, fontWeight:700, color:att.color, cursor:"pointer" }}>
                      {att.icon} {att.label}
                    </button>
                  </div>
                  <div style={{ textAlign:"right", padding:"10px 0" }}>
                    <div style={{ fontWeight:800, fontSize:17, color:getPointColor(s.points) }}>
                      {s.points>0?"+":""}{s.points}
                    </div>
                    <div style={{ fontSize:9, color:"#aaa" }}>today</div>
                    {(s.totalPoints||0) > 0 && <div style={{ fontSize:11, fontWeight:700, color:"#9B6DD1" }}>{(s.totalPoints||0) + s.points} total</div>}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* Activity summary footer */}
        <div style={{ marginTop:16, display:"flex", gap:10, flexWrap:"wrap" }}>
          {CATEGORIES.map(cat => {
            const count = students.reduce((acc,s) => acc + s.log.filter(l=>l.label===cat.label).length, 0);
            return (
              <div key={cat.id} style={{ background:"white", borderRadius:10, padding:"8px 14px", border:`1.5px solid ${cat.color}20`, fontSize:12, display:"flex", alignItems:"center", gap:6 }}>
                <span>{cat.emoji}</span>
                <span style={{ color:"#555" }}>{cat.label}</span>
                <span style={{ fontWeight:700, color:cat.color }}>{count}×</span>
              </div>
            );
          })}
        </div>

        {/* Absent list */}
        <div className="no-print" style={{ marginTop:14, background:"white", borderRadius:12, border:"1.5px solid #E05C5C30", padding:"12px 16px" }}>
          <div style={{ fontSize:12, fontWeight:700, color:"#E05C5C", marginBottom:8 }}>
            ❌ Absent / Unmarked — {activePeriod} ({students.filter(s=>s.attendance!=="present").length})
          </div>
          <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
            {students.filter(s=>s.attendance!=="present").length===0 ? (
              <div style={{ fontSize:12, color:"#aaa" }}>✅ All marked present</div>
            ) : (
              students.map((s,origI) => s.attendance!=="present" ? (
                <button key={origI} onClick={() => toggleAttendance(origI)}
                  style={{ background:"#FFF1F1", border:"1px solid #E05C5C40", borderRadius:8, padding:"5px 12px", fontSize:12, cursor:"pointer" }}>
                  <span style={{ fontWeight:600, color:"#C0392B" }}>{s.name}</span>
                  <span style={{ color:"#aaa", fontSize:10, marginLeft:6 }}>tap → present</span>
                </button>
              ) : null)
            )}
          </div>
        </div>
      </div>

      {/* ── Award Popover ── */}
      {selected !== null && popoverPos && ReactDOM.createPortal(
        <div ref={popoverRef} style={{
          position:"absolute",
          top:(() => {
            const panelH = 210;
            const spaceBelow = document.documentElement.scrollHeight - (popoverPos.top + popoverPos.height);
            return spaceBelow > panelH ? popoverPos.top + popoverPos.height + 8 : popoverPos.top - panelH - 8;
          })(),
          left: Math.min(Math.max(popoverPos.left, 12), window.innerWidth - 352),
          width: Math.min(340, window.innerWidth - 24),
          background:"white",
          borderRadius:14,
          border:`2px solid ${pc.accent}`,
          padding:16,
          boxShadow:"0 8px 32px rgba(0,0,0,0.18)",
          zIndex:1000,
        }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
            <div style={{ fontWeight:700, fontSize:14, color:pc.accent }}>
              🏅 Award → {students[selected]?.name}
              <span style={{ background:pc.bg, color:pc.text, fontSize:10, borderRadius:5, padding:"2px 8px", marginLeft:8 }}>{activePeriod}</span>
            </div>
            <button onClick={() => { setSelected(null); setPopoverPos(null); }} style={{ background:"none", border:"none", fontSize:17, cursor:"pointer", color:"#aaa" }}>✕</button>
          </div>
          <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
            {CATEGORIES.map(cat => (
              <button key={cat.id} onClick={e => { e.stopPropagation(); award(selected, cat); }}
                style={{ background:cat.color, color:"white", border:"none", borderRadius:9, padding:"8px 13px", fontSize:12, fontWeight:600, cursor:"pointer", display:"flex", alignItems:"center", gap:5, boxShadow:"0 2px 8px rgba(0,0,0,0.12)" }}>
                {cat.emoji} {cat.label}
