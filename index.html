                <span style={{ background:"rgba(255,255,255,0.25)", borderRadius:5, padding:"1px 6px", fontSize:11 }}>{cat.points>0?"+":""}{cat.points}</span>
              </button>
            ))}
          </div>
          <div style={{ marginTop:12, display:"flex", justifyContent:"flex-end" }}>
            <button onClick={() => { setSelected(null); setPopoverPos(null); }}
              style={{ background:pc.accent, color:"white", border:"none", borderRadius:9, padding:"7px 20px", fontSize:12, fontWeight:700, cursor:"pointer" }}>
              Done
            </button>
          </div>
        </div>,
        document.body
      )}

      {/* ── Undo Toast ── */}
      {undoToast && (
        <div style={{ position:"fixed", bottom:24, left:"50%", transform:"translateX(-50%)", background:"#1A1A2E", color:"white", borderRadius:12, padding:"10px 18px", display:"flex", alignItems:"center", gap:12, boxShadow:"0 6px 24px rgba(0,0,0,0.3)", zIndex:999, fontSize:13, border:"1px solid rgba(255,255,255,0.1)", whiteSpace:"nowrap" }}>
          <span style={{ color:"#aaa" }}>Awarded: <strong style={{ color:"white" }}>{undoToast.label}</strong></span>
          <button onClick={undo} style={{ background:"#FFD166", color:"#1A1A2E", border:"none", borderRadius:8, padding:"5px 12px", fontWeight:700, fontSize:12, cursor:"pointer" }}>↩ Undo</button>
          <button onClick={() => setUndoToast(null)} style={{ background:"none", border:"none", color:"#666", fontSize:15, cursor:"pointer" }}>✕</button>
        </div>
      )}

      {/* ── Parent Note Modal ── */}
      {editNoteFor !== null && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.5)", zIndex:2000, display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}>
          <div style={{ background:"white", borderRadius:16, padding:24, maxWidth:400, width:"100%", boxShadow:"0 20px 60px rgba(0,0,0,0.3)" }}>
            <h3 style={{ margin:"0 0 6px", fontSize:16 }}>📝 Parent Note</h3>
            <div style={{ fontSize:13, color:"#888", marginBottom:14 }}>
              For <strong>{students[editNoteFor]?.name}</strong> · Appears on printed report
            </div>
            <textarea value={noteText} onChange={e => setNoteText(e.target.value)}
              placeholder="e.g. 'Called home 6/12. Parent aware of missing work.'"
              rows={4}
              style={{ width:"100%", padding:"10px 12px", border:"2px solid #E0E4EC", borderRadius:10, fontSize:14, resize:"vertical", outline:"none" }} />
            <div style={{ display:"flex", gap:8, marginTop:14, justifyContent:"flex-end" }}>
              <button onClick={() => { setEditNoteFor(null); setNoteText(""); }}
                style={{ background:"none", border:"2px solid #E0E4EC", borderRadius:9, padding:"8px 18px", fontSize:13, cursor:"pointer" }}>Cancel</button>
              <button onClick={saveNote}
                style={{ background:"#4C9B82", color:"white", border:"none", borderRadius:9, padding:"8px 20px", fontSize:13, fontWeight:700, cursor:"pointer" }}>Save Note</button>
            </div>
          </div>
        </div>
      )}

      {/* ── Reports Page (full page swap) ── */}
      {showReport && ReactDOM.createPortal(
        <ParentReportModal allPeriodData={allPeriodData} onClose={() => setShowReport(false)} onPrint={(html) => { window.triggerPrint(html); }} />,
        document.body
      )}

      {/* ── Sheets Setup Modal ── */}
      {showSheetsSetup && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.5)", zIndex:3000, display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}>
          <div style={{ background:"white", borderRadius:16, padding:28, maxWidth:520, width:"100%", boxShadow:"0 20px 60px rgba(0,0,0,0.3)" }}>
            <h3 style={{ margin:"0 0 6px", fontSize:17 }}>📊 Connect Google Sheets</h3>
            <p style={{ fontSize:13, color:"#666", margin:"0 0 18px", lineHeight:1.6 }}>
              You need a Google Apps Script web app to receive the data. Follow these steps:
            </p>
            <ol style={{ fontSize:12, color:"#555", lineHeight:2, paddingLeft:18, margin:"0 0 18px" }}>
              <li>Open <strong>script.google.com</strong> → New project</li>
              <li>Paste the script below, then click <strong>Deploy → New deployment → Web app</strong></li>
              <li>Set <em>Execute as: Me</em> and <em>Who has access: Anyone</em></li>
              <li>Copy the Web App URL and paste it here</li>
            </ol>
            <div style={{ background:"#F0F4F8", borderRadius:8, padding:"10px 14px", fontSize:11, fontFamily:"monospace", color:"#333", marginBottom:16, whiteSpace:"pre-wrap", lineHeight:1.6 }}>
{`function doGet(e) {
  var data = JSON.parse(decodeURIComponent(e.parameter.data));
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  var sheet = ss.getSheetByName("Participation") 
    || ss.insertSheet("Participation");
  data.forEach(function(row) { sheet.appendRow(row); });
  return ContentService.createTextOutput("OK");
}`}
            </div>
            <label style={{ fontSize:12, fontWeight:700, color:"#555", display:"block", marginBottom:6 }}>Web App URL</label>
            <input value={sheetsUrlInput} onChange={e => setSheetsUrlInput(e.target.value)}
              placeholder="https://script.google.com/macros/s/..."
              style={{ width:"100%", padding:"10px 12px", border:"2px solid #E0E4EC", borderRadius:10, fontSize:13, outline:"none", marginBottom:16 }} />
            <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
              <button onClick={() => setShowSheetsSetup(false)}
                style={{ background:"none", border:"2px solid #E0E4EC", borderRadius:9, padding:"8px 18px", fontSize:13, cursor:"pointer" }}>Cancel</button>
              <button onClick={saveSheetsUrl} disabled={!sheetsUrlInput.trim()}
                style={{ background:"#34A853", color:"white", border:"none", borderRadius:9, padding:"8px 20px", fontSize:13, fontWeight:700, cursor:"pointer" }}>Save & Export</button>
            </div>
          </div>
        </div>
      )}

      {/* ── Drive Setup Modal ── */}
      {showDriveSetup && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.5)", zIndex:3000, display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}>
          <div style={{ background:"white", borderRadius:16, padding:28, maxWidth:540, width:"100%", boxShadow:"0 20px 60px rgba(0,0,0,0.3)" }}>
            <h3 style={{ margin:"0 0 6px", fontSize:17 }}>☁️ Connect Google Drive</h3>
            <p style={{ fontSize:13, color:"#666", margin:"0 0 16px", lineHeight:1.6 }}>
              One-time setup — after this, your data auto-saves to Drive every time you click End Day.
            </p>
            <ol style={{ fontSize:12, color:"#555", lineHeight:2.2, paddingLeft:18, margin:"0 0 18px" }}>
              <li>Go to <strong>console.cloud.google.com</strong> → New Project</li>
              <li>Enable <strong>Google Drive API</strong></li>
              <li>Go to <strong>APIs &amp; Services → Credentials → Create Credentials → OAuth 2.0 Client ID</strong></li>
              <li>Application type: <strong>Web application</strong></li>
              <li>Add your GitHub Pages URL to <strong>Authorized JavaScript origins</strong>:<br/>
                <code style={{ background:"#F0F4F8", padding:"2px 6px", borderRadius:4, fontSize:11 }}>{window.location.origin}</code>
              </li>
              <li>Copy the <strong>Client ID</strong> and paste it below</li>
            </ol>
            <label style={{ fontSize:12, fontWeight:700, color:"#555", display:"block", marginBottom:6 }}>Google OAuth Client ID</label>
            <input value={driveClientIdInput} onChange={e => setDriveClientIdInput(e.target.value)}
              placeholder="123456789-abc...apps.googleusercontent.com"
              style={{ width:"100%", padding:"10px 12px", border:"2px solid #E0E4EC", borderRadius:10, fontSize:13, outline:"none", marginBottom:16 }} />
            <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
              <button onClick={() => setShowDriveSetup(false)}
                style={{ background:"none", border:"2px solid #E0E4EC", borderRadius:9, padding:"8px 18px", fontSize:13, cursor:"pointer" }}>Cancel</button>
              <button onClick={saveDriveClientId} disabled={!driveClientIdInput.trim()}
                style={{ background:"#4285F4", color:"white", border:"none", borderRadius:9, padding:"8px 20px", fontSize:13, fontWeight:700, cursor:"pointer" }}>Connect Drive</button>
            </div>
          </div>
        </div>
      )}

      {/* ── Drive Status Toast ── */}
      {driveMsg && (
        <div style={{ position:"fixed", bottom:24, right:24, background:"#1A1A2E", color:"white", borderRadius:12, padding:"10px 16px", fontSize:13, border:"1px solid rgba(66,133,244,0.5)", boxShadow:"0 6px 24px rgba(0,0,0,0.3)", zIndex:998, display:"flex", alignItems:"center", gap:10, maxWidth:320 }}>
          <span style={{ color:"#8AB4F8" }}>{driveMsg}</span>
          <button onClick={() => setDriveMsg("")} style={{ background:"none", border:"none", color:"#666", fontSize:14, cursor:"pointer" }}>✕</button>
        </div>
      )}
      {sheetsToast && (
        <div style={{ position:"fixed", bottom:24, left:"50%", transform:"translateX(-50%)", background:"#1B3D2E", color:"white", borderRadius:12, padding:"12px 20px", display:"flex", alignItems:"center", gap:12, boxShadow:"0 6px 24px rgba(0,0,0,0.3)", zIndex:999, fontSize:13, border:"1px solid #4C9B82", whiteSpace:"nowrap" }}>
          <span style={{ color:"#7EC8A4" }}>{sheetsToast.msg}</span>
          {sheetsToast.ok && <button onClick={() => setSheetsUrl("")} style={{ background:"none", border:"1px solid #4C9B82", borderRadius:6, color:"#7EC8A4", fontSize:11, padding:"2px 8px", cursor:"pointer" }}>Change URL</button>}
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
// Plain JS - no Babel - handles printing
window.triggerPrint = function(html) {
  var div = document.createElement("div");
  div.id = "pt-print-root";
  div.style.cssText = "font-family:'Segoe UI',sans-serif;padding:24px;color:#1A1A2E;background:white";
  div.innerHTML = html;
  document.body.appendChild(div);
  var style = document.createElement("style");
  style.textContent = "@media print{body *{display:none!important}#pt-print-root,#pt-print-root *{display:revert!important}@page{margin:1.5cm}}";
  document.head.appendChild(style);
  window.print();
  document.body.removeChild(div);
  document.head.removeChild(style);
};
</script>
</body>
</html>
