<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── SUPABASE CONFIG ────────────────────────────────────────────────────────
const SUPABASE_URL = "https://rgyvkuyknchqijqxddvh.supabase.co";
const SUPABASE_KEY = "sb_publishable_U3BrMwMgicyTDr2vC6lYLw_5iPu6lDt";
const TABLE = "participation_tracker";
const ROW_ID = "main";

async function supabaseGet(token) {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?id=eq.${ROW_ID}&select=data`, {
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${token || SUPABASE_KEY}`,
        "Content-Type": "application/json",
      }
    });
    if (!res.ok) return null;
    const rows = await res.json();
    return rows.length > 0 ? rows[0].data : null;
  } catch(e) { return null; }
}

async function supabaseSave(data, token) {
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?id=eq.${ROW_ID}`, {
      method: "PATCH",
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${token || SUPABASE_KEY}`,
        "Content-Type": "application/json",
        "Prefer": "return=minimal",
      },
      body: JSON.stringify({ data, updated_at: new Date().toISOString() })
    });
  } catch(e) {}
}

// ─── SUPABASE AUTH ──────────────────────────────────────────────────────────
async function supabaseSignIn(email, password) {
  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: "POST",
      headers: {
        "apikey": SUPABASE_KEY,
        "Content-Type": "application/json",
      },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) return { error: data.error_description || data.msg || "Login failed" };
    return { token: data.access_token, user: data.user };
  } catch(e) { return { error: "Network error" }; }
}

async function supabaseSignOut(token) {
  try {
    await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
      method: "POST",
      headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${token}` }
    });
  } catch(e) {}
}

// ─── CONSTANTS ──────────────────────────────────────────────────────────────
const PERIODS = ["P1", "P2", "P3", "P4", "P5"];

const PERIOD_COLORS = {
  P1: { bg: "#E8F5F0", accent: "#4C9B82", text: "#1B5E47" },
  P2: { bg: "#EBF3FF", accent: "#5B8DD9", text: "#1B3A6B" },
  P3: { bg: "#F3EEFF", accent: "#9B6DD1", text: "#3D1A80" },
  P4: { bg: "#FFF5E6", accent: "#E8934A", text: "#7A3D00" },
  P5: { bg: "#FFEAF0", accent: "#D4527A", text: "#7A1636" },
};

const CATEGORIES = [
  { id: "entrance",  label: "Entrance Ticket",     emoji: "🎫", points: 1,  color: "#4C9B82" },
  { id: "turntalk",  label: "Turn & Talk",          emoji: "🗣️", points: 1,  color: "#E8934A" },
  { id: "reasoning", label: "Answer + Reasoning",   emoji: "🧠", points: 1,  color: "#5B8DD9" },
  { id: "vocab",     label: "Question + Vocab",     emoji: "📚", points: 1,  color: "#9B6DD1" },
  { id: "sharework", label: "Share Work Publicly",  emoji: "🌟", points: 1,  color: "#D4A017" },
  { id: "offtask",   label: "Off-Task/Talking",     emoji: "🔇", points: -1, color: "#E05C5C" },
];

const DEFAULT_STUDENTS = {
  P1: ["Aaliyah", "Brandon", "Celeste", "David", "Esther", "Felix", "Grace", "Henry"],
  P2: ["Isabel", "James", "Kira", "Leo", "Maya", "Nathan", "Olivia", "Patrick"],
  P3: ["Quinn", "Rosa", "Samuel", "Talia", "Ulric", "Vera", "Wesley", "Xena"],
  P4: ["Yasmine", "Zachary", "Amara", "Ben", "Chloe", "Diego", "Elena", "Frank"],
  P5: ["Gina", "Hector", "Iris", "Jake", "Karen", "Luis", "Mia", "Nora"],
};

const STORAGE_BASE = "pt_v2_";
const LAST_DATE_KEY = "pt_last_active_date";

// ─── DATE HELPERS ───────────────────────────────────────────────────────────
const getTodayDateStr = () => new Date().toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" });
const getTodayStr = () => new Date().toLocaleDateString("en-US", { weekday:"short", month:"short", day:"numeric", year:"numeric" });
const getTimeStr = () => new Date().toLocaleTimeString("en-US", { hour:"2-digit", minute:"2-digit" });
const getShortDateStr = () => new Date().toLocaleDateString("en-US", { month:"short", day:"numeric" });

// ─── LOCAL STORAGE HELPERS (fallback) ───────────────────────────────────────
const loadPeriodDataLocal = (period) => {
  try {
    const raw = localStorage.getItem(STORAGE_BASE + period);
    if (raw) {
      const data = JSON.parse(raw);
      return data.map(s => ({
        ...s,
        history: s.history || [],
        totalPoints: (s.history || []).reduce((sum, day) => sum + (day.points || 0), 0),
      }));
    }
  } catch(e) {}
  return DEFAULT_STUDENTS[period].map(name => ({
    name, points: 0, log: [], attendance: "absent",
    notes: "", parentNote: "", history: [], totalPoints: 0
  }));
};

const savePeriodDataLocal = (period, students) => {
  try { localStorage.setItem(STORAGE_BASE + period, JSON.stringify(students)); } catch(e) {}
};

const getLastActiveDate = () => localStorage.getItem(LAST_DATE_KEY) || "";
const setLastActiveDate = (d) => localStorage.setItem(LAST_DATE_KEY, d);

const buildDefaultAllData = () => {
  const data = {};
  PERIODS.forEach(p => { data[p] = loadPeriodDataLocal(p); });
  return data;
};

// ─── AUTO-ROLLOVER ───────────────────────────────────────────────────────────
const performDayRollover = (allPeriodData, dateLabel) => {
  const newData = {};
  PERIODS.forEach(p => {
    const students = allPeriodData[p] || [];
    newData[p] = students.map(s => {
      const hasActivity = s.points !== 0 || s.log.length > 0 || s.attendance === "present";
      if (!hasActivity) return { ...s, points: 0, log: [], attendance: "absent" };
      const dayRecord = { date: dateLabel, points: s.points, log: s.log, attendance: s.attendance };
      const newHistory = [dayRecord, ...(s.history || [])];
      const newTotal = newHistory.reduce((sum, day) => sum + (day.points || 0), 0);
      return { ...s, points: 0, log: [], attendance: "absent", history: newHistory, totalPoints: newTotal };
    });
    savePeriodDataLocal(p, newData[p]);
  });
  return newData;
};

function getAttendanceMeta(att) {
  if (att === "present") return { icon: "✅", label: "Present", color: "#4C9B82", bg: "#E8F5F0", border: "#4C9B82" };
  if (att === "absent")  return { icon: "❌", label: "Absent",  color: "#E05C5C", bg: "#FFF1F1", border: "#E05C5C" };
  return { icon: "○", label: "Mark", color: "#bbb", bg: "#F5F5F5", border: "#ddd" };
}

function getBadge(pts) {
  if (pts >= 5) return "⭐";
  if (pts >= 3) return "🌟";
  if (pts < 0)  return "⚠️";
  return null;
}
function getPointColor(pts) { return pts > 0 ? "#2E7D5E" : pts < 0 ? "#C0392B" : "#888"; }
function getCardBg(pts) { return pts >= 5 ? "#FFF8E7" : pts < 0 ? "#FFF1F1" : "#FFFFFF"; }

// ─── REPORT PRINT HTML ──────────────────────────────────────────────────────
function buildPrintHTML(allPeriodData, selectedPeriod, reportMode, teacherName, className, dateLabel, singleStudent) {
  const periodsData = selectedPeriod === "ALL" ? PERIODS : [selectedPeriod];
  const studentRows = periodsData.flatMap(function(period) {
    const pStudents = allPeriodData[period] || [];
    const pc = PERIOD_COLORS[period];
    const targets = singleStudent
      ? pStudents.filter(function(s) { return s.name === singleStudent.name && period === singleStudent.period; })
      : pStudents;
    return targets.map(function(s) { return { s, period, pc }; });
  });

  const cards = studentRows.map(function(row) {
    const s = row.s, period = row.period, pc = row.pc;
    const att = getAttendanceMeta(s.attendance);
    const initials = s.name.split(" ").map(n => n[0]).join("").slice(0,2).toUpperCase();
    const ptColor = s.points > 0 ? "#2E7D5E" : s.points < 0 ? "#C0392B" : "#888";
    const ptStr = (s.points > 0 ? "+" : "") + s.points;
    const totalPts = (s.totalPoints || 0) + s.points;

    // Category icons (same for both modes)
    const catIcons = CATEGORIES.filter(c => s.log.some(l => l.label === c.label)).map(cat => {
      const count = s.log.filter(l => l.label === cat.label).length;
      return `<div style="background:${cat.color}18;border:1px solid ${cat.color}40;border-radius:20px;padding:3px 10px;font-size:13px;display:inline-flex;align-items:center;gap:4px;margin:2px">${cat.emoji}${count > 1 ? `<span style="font-size:10px;font-weight:700;color:${cat.color}">×${count}</span>` : ""}</div>`;
    }).join("");

    // Today's activity log
    const todayLog = reportMode === "full" && s.log.length > 0
      ? `<div style="border-top:1px solid #F0F2F6;padding-top:8px;margin-top:6px"><div style="font-size:9px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Activity Log</div>${s.log.map(e => {
          const ec = e.pts > 0 ? "#2E7D5E" : "#C0392B";
          return `<div style="display:flex;align-items:center;gap:6px;padding:2px 0;font-size:11px;border-bottom:1px solid #f5f5f5"><span>${e.emoji}</span><span style="flex:1;color:#555">${e.label}</span><span style="color:${ec};font-weight:700">${e.pts > 0 ? "+" : ""}${e.pts}</span><span style="color:#bbb;font-size:10px;min-width:40px;text-align:right">${e.time}</span></div>`;
        }).join("")}</div>` : "";

    // History
    const histDisplayed = reportMode === "full" ? (s.history || []) : (s.history || []).slice(0, 3);
    const historyRows = histDisplayed.map(function(day) {
      const dayPtColor = day.points > 0 ? "#2E7D5E" : day.points < 0 ? "#C0392B" : "#888";
      const dayPts = (day.points > 0 ? "+" : "") + day.points;
      const attendedCats = CATEGORIES.filter(c => (day.log||[]).some(l => l.label === c.label));
      if (reportMode === "full") {
        const dayLogRows = (day.log||[]).map(e => {
          const ec = e.pts > 0 ? "#2E7D5E" : "#C0392B";
          return `<div style="display:flex;align-items:center;gap:6px;padding:2px 0;font-size:11px"><span>${e.emoji}</span><span style="flex:1;color:#555">${e.label}</span><span style="color:${ec};font-weight:700">${e.pts > 0 ? "+" : ""}${e.pts}</span><span style="color:#bbb;font-size:10px;min-width:40px;text-align:right">${e.time}</span></div>`;
        }).join("");
        return `<div style="padding:6px 0;border-bottom:1px solid #f0f0f0"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-weight:700;font-size:11px;color:#333">${day.date}</span><div style="display:flex;align-items:center;gap:8px"><span style="font-size:11px;color:${day.attendance==="present"?"#4C9B82":"#E05C5C"};font-weight:600">${day.attendance==="present"?"Present":"Absent"}</span><span style="font-weight:700;color:${dayPtColor};font-size:12px">${dayPts} pts</span></div></div><div style="border-left:2px solid #E8EBF0;padding-left:8px">${dayLogRows||`<div style="font-size:11px;color:#bbb">No activity recorded</div>`}</div></div>`;
      } else {
        const dayCats = attendedCats.map(c=>c.emoji).join(" ");
        return `<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid #f0f0f0;font-size:11px"><span style="color:#999;min-width:68px;font-size:10px;flex-shrink:0">${day.date}</span><span style="font-size:12px">${day.attendance==="present"?"✅":"❌"}</span><span style="flex:1;color:#888;font-size:12px;letter-spacing:2px">${dayCats||"—"}</span><span style="font-weight:700;color:${dayPtColor};min-width:28px;text-align:right">${dayPts}</span></div>`;
      }
    }).join("");

    const histLabel = reportMode==="full" ? `History (${(s.history||[]).length} days)` : `Recent History (last ${histDisplayed.length} of ${(s.history||[]).length} days)`;
    const cumTotal = reportMode==="full" && (s.history||[]).length > 0
      ? `<div style="display:flex;justify-content:space-between;padding:8px 0 0;font-size:12px;font-weight:700;border-top:1px solid #E8EBF0;margin-top:4px"><span style="color:#555">Cumulative total (${(s.history||[]).length} days)</span><span style="color:#9B6DD1">${totalPts} pts</span></div>` : "";
    const historySection = (s.history||[]).length > 0
      ? `<div style="border-top:2px solid #E8EBF0;margin-top:10px;padding-top:8px"><div style="font-size:10px;font-weight:700;color:#9B6DD1;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">📅 ${histLabel}</div>${historyRows}${cumTotal}</div>` : "";

    const noteHTML = s.parentNote ? `<div style="background:#FFFBEA;border:1px solid #FFD166;border-radius:6px;padding:6px 10px;font-size:11px;color:#7A5200;margin-top:8px"><b>Note:</b> ${s.parentNote}</div>` : "";
    const noActivity = s.log.length === 0 ? `<div style="font-size:12px;color:#bbb;text-align:center;padding:8px">No activity today</div>` : "";

    return `<div style="background:white;border:1.5px solid #E8EBF0;border-radius:10px;overflow:hidden;page-break-inside:avoid;break-inside:avoid;margin-bottom:4px"><div style="background:${pc.bg};padding:10px 14px;display:flex;align-items:center;justify-content:space-between"><div style="display:flex;align-items:center;gap:10px"><div style="width:34px;height:34px;border-radius:50%;background:${pc.accent};color:white;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700">${initials}</div><div><div style="font-weight:700;font-size:14px;color:${pc.text}">${s.name}</div><div style="font-size:11px;color:${pc.accent}">${period} · ${att.icon} ${att.label}</div></div></div><div style="text-align:right"><div style="font-size:22px;font-weight:800;color:${ptColor}">${ptStr}</div><div style="font-size:9px;color:#aaa">today</div><div style="font-size:13px;font-weight:700;color:#9B6DD1">${totalPts} total</div></div></div><div style="padding:10px 14px">${noActivity}<div style="display:flex;flex-wrap:wrap;gap:2px;margin-bottom:6px">${catIcons}</div>${todayLog}${historySection}${noteHTML}</div><div style="background:#F8F9FC;border-top:1px solid #F0F2F6;padding:6px 14px;display:flex;justify-content:space-between"><span style="font-size:10px;color:#bbb">${((s.history||[]).length+(s.points!==0||s.log.length>0||s.attendance==="present"?1:0))} days tracked</span><span style="font-size:10px;color:#bbb">${className} · ${period}</span></div></div>`;
  }).join("");

  return `<h1 style="font-size:20px;font-weight:800;margin:0 0 4px">${className} — Participation Reports</h1><div style="font-size:13px;color:#888;margin-bottom:20px">${teacherName} · ${dateLabel}</div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px">${cards}</div>`;
}

// ─── IMPORT ROSTER MODAL ────────────────────────────────────────────────────
function ImportRosterModal({ onClose, onImport }) {
  const [activePeriod, setActivePeriod] = useState("P1");
  const [rosterText, setRosterText] = useState({ P1:"", P2:"", P3:"", P4:"", P5:"" });
  const [preview, setPreview] = useState({ P1:[], P2:[], P3:[], P4:[], P5:[] });

  const parseNames = (text) => {
    return text.split(/[\n\r]+/)
      .map(n => n.trim())
      .filter(n => n.length > 0 && n.length < 60);
  };

  const handlePaste = (period, text) => {
    setRosterText(prev => ({ ...prev, [period]: text }));
    setPreview(prev => ({ ...prev, [period]: parseNames(text) }));
  };

  const totalNames = Object.values(preview).reduce((sum, arr) => sum + arr.length, 0);

  const handleImport = () => {
    const result = {};
    PERIODS.forEach(p => {
      result[p] = preview[p].map(name => ({
        name, points: 0, log: [], attendance: "absent",
        notes: "", parentNote: "", history: [], totalPoints: 0
      }));
    });
    onImport(result);
    onClose();
  };

  return (
    <div style={{ position:"fixed", inset:0, zIndex:3000, background:"rgba(0,0,0,0.65)", display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
      <div style={{ background:"white", borderRadius:16, width:"100%", maxWidth:560, maxHeight:"90vh", overflow:"hidden", display:"flex", flexDirection:"column", boxShadow:"0 24px 64px rgba(0,0,0,0.3)" }}>
        
        {/* Header */}
        <div style={{ background:"linear-gradient(135deg,#1A1A2E,#16213E)", color:"white", padding:"18px 22px", flexShrink:0 }}>
          <div style={{ fontSize:10, letterSpacing:3, textTransform:"uppercase", color:"#7EC8A4", fontWeight:600, marginBottom:4 }}>Setup</div>
          <div style={{ fontSize:18, fontWeight:700 }}>Import Class Roster</div>
          <div style={{ fontSize:12, color:"rgba(255,255,255,0.5)", marginTop:4 }}>
            Paste names from Google Sheets — one name per row, or comma-separated
          </div>
        </div>

        {/* Period tabs */}
        <div style={{ display:"flex", borderBottom:"2px solid #E8EBF0", flexShrink:0, overflowX:"auto" }}>
          {PERIODS.map(p => {
            const pc = PERIOD_COLORS[p];
            const count = preview[p].length;
            const isActive = p === activePeriod;
            return (
              <button key={p} onClick={() => setActivePeriod(p)}
                style={{ flex:1, padding:"10px 8px", border:"none", borderBottom: isActive ? `3px solid ${pc.accent}` : "3px solid transparent", background: isActive ? pc.bg : "white", cursor:"pointer", fontSize:12, fontWeight:isActive?700:500, color: isActive ? pc.text : "#999", minWidth:70, transition:"all 0.15s" }}>
                <div style={{ fontWeight:800 }}>{p}</div>
                <div style={{ fontSize:10, color: count > 0 ? pc.accent : "#ccc", marginTop:2 }}>
                  {count > 0 ? `${count} students` : "empty"}
                </div>
              </button>
            );
          })}
        </div>

        {/* Content */}
        <div style={{ padding:20, flex:1, overflowY:"auto" }}>
          <div style={{ marginBottom:10, fontSize:13, color:"#555", fontWeight:600 }}>
            {activePeriod} — Paste your roster below
          </div>
          <div style={{ fontSize:12, color:"#999", marginBottom:10, background:"#F8F9FC", borderRadius:8, padding:"8px 12px", lineHeight:1.6 }}>
            💡 In Google Sheets: select the column of names → Ctrl+C → paste here
          </div>
          <textarea
            value={rosterText[activePeriod]}
            onChange={e => handlePaste(activePeriod, e.target.value)}
            placeholder={"Aaliyah Johnson\nBrandon Lee\nCeleste Rivera\n..."}
            rows={8}
            style={{ width:"100%", padding:"10px 12px", border:"2px solid #E0E4EC", borderRadius:10, fontSize:13, resize:"vertical", outline:"none", fontFamily:"inherit", lineHeight:1.6 }}
          />

          {/* Preview */}
          {preview[activePeriod].length > 0 && (
            <div style={{ marginTop:12 }}>
              <div style={{ fontSize:11, fontWeight:700, color:"#4C9B82", textTransform:"uppercase", letterSpacing:1, marginBottom:8 }}>
                ✅ {preview[activePeriod].length} students detected
              </div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                {preview[activePeriod].map((name, i) => (
                  <div key={i} style={{ background:PERIOD_COLORS[activePeriod].bg, color:PERIOD_COLORS[activePeriod].text, border:`1px solid ${PERIOD_COLORS[activePeriod].accent}40`, borderRadius:20, padding:"3px 12px", fontSize:12, fontWeight:600 }}>
                    {name}
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* Footer */}
        <div style={{ padding:"14px 20px", borderTop:"1px solid #E8EBF0", display:"flex", alignItems:"center", justifyContent:"space-between", flexShrink:0, background:"#F8F9FC" }}>
          <div style={{ fontSize:12, color:"#888" }}>
            {totalNames > 0 ? <span style={{ color:"#4C9B82", fontWeight:700 }}>✅ {totalNames} students total across all periods</span> : "No names added yet"}
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={onClose} style={{ background:"none", border:"2px solid #E0E4EC", borderRadius:9, padding:"8px 18px", fontSize:13, cursor:"pointer", color:"#666" }}>
              Cancel
            </button>
            <button onClick={handleImport} disabled={totalNames === 0}
              style={{ background: totalNames > 0 ? "#4C9B82" : "#ccc", color:"white", border:"none", borderRadius:9, padding:"8px 22px", fontSize:13, fontWeight:700, cursor: totalNames > 0 ? "pointer" : "default" }}>
              Import {totalNames > 0 ? `${totalNames} Students` : ""}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── PARENT REPORT MODAL ────────────────────────────────────────────────────
function ParentReportModal({ allPeriodData, onClose, onPrint }) {
  const [selectedPeriod, setSelectedPeriod] = useState("ALL");
  const [reportMode, setReportMode] = useState("summary");
  const [dateLabel, setDateLabel] = useState(`Week of ${getTodayStr()}`);
  const [teacherName, setTeacherName] = useState("Ms. Lin");
  const [className, setClassName] = useState("Algebra 2");
  const periodsToShow = selectedPeriod === "ALL" ? PERIODS : [selectedPeriod];

  const getStarMessage = (s) => {
    if (s.points >= 5) return `Outstanding participation this period! ${s.name} has been an excellent contributor to class discussions.`;
    if (s.points >= 3) return `${s.name} showed strong engagement and made meaningful contributions to class.`;
    if (s.points >= 1) return "";

                                    );
                                  } else {
                                    const dayCats = attendedCats.map(c => c.emoji).join(" ");
                                    return (
                                      <div key={di} style={{ display:"flex", alignItems:"center", gap:8, padding:"4px 0", borderBottom:"1px solid #f5f5f5", fontSize:11 }}>

                                        <span style={{ fontSize:12 }}>{day.attendance === "present" ? "✅" : "❌"}</span>
                                        <span style={{ flex:1, color:"#888", fontSize:12, letterSpacing:2 }}>{dayCats || "—"}</span>
                                        <span style={{ fontWeight:700, color:dayPtColor, minWidth:28, textAlign:"right" }}>{dayPts}</span>
                                      </div>
                                    );

                                })}

                                  <div style={{ display:"flex", justifyContent:"space-between", padding:"8px 0 0", fontSize:12, fontWeight:700, borderTop:"1px solid #E8EBF0", marginTop:4 }}>
                                    <span style={{ color:"#555" }}>Cumulative total ({hist.length} days)</span>
                                    <span style={{ color:"#9B6DD1" }}>{(s.totalPoints||0) + s.points} pts</span>
                                  </div>
                                )}
                              </div>
                            );
                          })()}
                        </div>
                        <div style={{ background:"#F8F9FC", borderTop:"1px solid #F0F2F6", padding:"6px 14px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                          <div style={{ fontSize:10, color:"#9B6DD1", fontWeight:700 }}>{(s.history||[]).length + (s.points !== 0 || s.log.length > 0 || s.attendance === "present" ? 1 : 0)} days tracked</div>
                          <button onClick={() => { const html = buildPrintHTML(allPeriodData, period, reportMode, teacherName, className, dateLabel, { name: s.name, period }); onPrint(html); onClose(); }}
                            style={{ background:"none", border:"1px solid #E0E4EC", borderRadius:6, padding:"3px 10px", fontSize:10, color:"#888", cursor:"pointer", fontWeight:600 }}>
                            🖨️ Print this student
                          </button>
                          <div style={{ fontSize:10, color:"#bbb" }}>{className} · {period}</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ─── LOGIN SCREEN ───────────────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const handleLogin = async () => {
    if (!email || !password) { setError("Please enter email and password."); return; }
    setLoading(true); setError("");
    const result = await supabaseSignIn(email, password);
    setLoading(false);
    if (result.error) { setError(result.error); return; }
    onLogin(result.token);
  };

  return (
    <div style={{ minHeight:"100vh", background:"linear-gradient(135deg,#1A1A2E 0%,#16213E 100%)", display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}>
      <div style={{ background:"white", borderRadius:20, padding:36, maxWidth:380, width:"100%", boxShadow:"0 24px 64px rgba(0,0,0,0.4)" }}>
        <div style={{ textAlign:"center", marginBottom:28 }}>
          <div style={{ fontSize:36, marginBottom:12 }}>📋</div>
          <div style={{ fontSize:22, fontWeight:800, color:"#1A1A2E", marginBottom:6 }}>Participation Tracker</div>
          <div style={{ fontSize:13, color:"#888" }}>Sign in to access your class data</div>
        </div>
        <div style={{ marginBottom:14 }}>
          <label style={{ fontSize:11, fontWeight:700, color:"#666", display:"block", marginBottom:5 }}>EMAIL</label>
          <input value={email} onChange={e => setEmail(e.target.value)} onKeyDown={e => e.key === "Enter" && handleLogin()}
            type="email" placeholder="your@email.com"
            style={{ width:"100%", padding:"11px 14px", border:"2px solid #E0E4EC", borderRadius:10, fontSize:14, outline:"none", fontFamily:"inherit" }} />
        </div>
        <div style={{ marginBottom:20 }}>
          <label style={{ fontSize:11, fontWeight:700, color:"#666", display:"block", marginBottom:5 }}>PASSWORD</label>
          <input value={password} onChange={e => setPassword(e.target.value)} onKeyDown={e => e.key === "Enter" && handleLogin()}
            type="password" placeholder="••••••••"
            style={{ width:"100%", padding:"11px 14px", border:"2px solid #E0E4EC", borderRadius:10, fontSize:14, outline:"none", fontFamily:"inherit" }} />
        </div>
        {error && <div style={{ background:"#FFF1F1", border:"1px solid #E05C5C40", borderRadius:8, padding:"8px 12px", fontSize:12, color:"#C0392B", marginBottom:14 }}>⚠️ {error}</div>}
        <button onClick={handleLogin} disabled={loading}
          style={{ width:"100%", background: loading ? "#aaa" : "#1A1A2E", color:"white", border:"none", borderRadius:10, padding:"13px", fontSize:15, fontWeight:700, cursor: loading ? "default" : "pointer" }}>
          {loading ? "Signing in…" : "Sign In"}
        </button>
        <div style={{ textAlign:"center", fontSize:11, color:"#bbb", marginTop:16 }}>🔒 Protected — authorized users only</div>
      </div>
    </div>
  );
}

// ─── ROOT WITH AUTH ──────────────────────────────────────────────────────────
function Root() {
  const [authToken, setAuthToken] = useState(() => sessionStorage.getItem("pt_token") || null);

  const handleLogin = (token) => {
    sessionStorage.setItem("pt_token", token);
    setAuthToken(token);
  };

  const handleLogout = async () => {
    await supabaseSignOut(authToken);
    sessionStorage.removeItem("pt_token");
    setAuthToken(null);
  };

  if (!authToken) return <LoginScreen onLogin={handleLogin} />;
  return <App authToken={authToken} onLogout={handleLogout} />;
}

// ─── MAIN APP ───────────────────────────────────────────────────────────────
function App({ authToken, onLogout }) {
  const [activePeriod, setActivePeriod] = useState("P1");
  const [allPeriodData, setAllPeriodData] = useState(buildDefaultAllData);
  const [cloudStatus, setCloudStatus] = useState("loading"); // loading | synced | saving | error | offline
  const [history, setHistory] = useState([]);
  const [selected, setSelected] = useState(null);
  const [popoverPos, setPopoverPos] = useState(null);
  const popoverRef = useRef(null);
  const [newName, setNewName] = useState("");
  const [view, setView] = useState("grid");
  const [showLog, setShowLog] = useState(null);
  const [flashAll, setFlashAll] = useState(null);
  const [undoToast, setUndoToast] = useState(null);
  const [showReport, setShowReport] = useState(false);
  const [editNoteFor, setEditNoteFor] = useState(null);
  const [noteText, setNoteText] = useState("");
  const [rolloverToast, setRolloverToast] = useState(null);
  const [giveAllHistory, setGiveAllHistory] = useState([]);
  const [showEndDayConfirm, setShowEndDayConfirm] = useState(false);
  const [showRosterImport, setShowRosterImport] = useState(false);
  const [showSemesterReset, setShowSemesterReset] = useState(false);
  const [sortBy, setSortBy] = useState("roster"); // roster | first | last
  const saveTimerRef = useRef(null);
  const isFirstLoad = useRef(true);

  const students = allPeriodData[activePeriod] || [];
  const pc = PERIOD_COLORS[activePeriod];

  // ── LOAD FROM SUPABASE ON MOUNT ───────────────────────────────────────────
  useEffect(() => {
    (async () => {
      setCloudStatus("loading");
      const cloudData = await supabaseGet(authToken);
      if (cloudData && Object.keys(cloudData).length > 0) {
        // Hydrate totalPoints
        const hydrated = {};
        PERIODS.forEach(p => {
          hydrated[p] = (cloudData[p] || []).map(s => ({
            ...s,
            history: s.history || [],
            totalPoints: (s.history || []).reduce((sum, d) => sum + (d.points || 0), 0),
          }));
          savePeriodDataLocal(p, hydrated[p]);
        });
        // Check rollover after loading cloud data
        const today = getTodayDateStr();
        const last = getLastActiveDate();
        if (last && last !== today) {
          const rolled = performDayRollover(hydrated, last);
          setAllPeriodData(rolled);
          setLastActiveDate(today);
          setRolloverToast({ date: last });
          setTimeout(() => setRolloverToast(null), 6000);
          setCloudStatus("synced");
          return;
        }
        if (!last) setLastActiveDate(today);
        setAllPeriodData(hydrated);
        setCloudStatus("synced");
      } else {
        // No cloud data — check rollover on local data
        const today = getTodayDateStr();
        const last = getLastActiveDate();
        if (last && last !== today) {
          setAllPeriodData(prev => {
            const rolled = performDayRollover(prev, last);
            return rolled;
          });
          setLastActiveDate(today);
          setRolloverToast({ date: last });
          setTimeout(() => setRolloverToast(null), 6000);
        }
        if (!last) setLastActiveDate(today);
        setCloudStatus(cloudData === null ? "error" : "synced");
      }
    })();
  }, []);

  // ── AUTO-SAVE TO SUPABASE (debounced 1.5s) ───────────────────────────────
  useEffect(() => {
    if (isFirstLoad.current) { isFirstLoad.current = false; return; }
    setCloudStatus("saving");
    if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
    saveTimerRef.current = setTimeout(async () => {
      const ok = await supabaseSave(allPeriodData, authToken);
      setCloudStatus(ok === undefined ? "synced" : "error");
      // Also update last active date
      setLastActiveDate(getTodayDateStr());
    }, 1500);
    return () => { if (saveTimerRef.current) clearTimeout(saveTimerRef.current); };
  }, [allPeriodData]);

  // ── MIDNIGHT CHECK ────────────────────────────────────────────────────────
  useEffect(() => {
    const interval = setInterval(() => {
      const today = getTodayDateStr();
      const last = getLastActiveDate();
      if (last && last !== today) {
        setAllPeriodData(prev => {
          const rolled = performDayRollover(prev, last);
          return rolled;
        });
        setLastActiveDate(today);
        setRolloverToast({ date: last });
        setTimeout(() => setRolloverToast(null), 6000);
      }
    }, 60000);
    return () => clearInterval(interval);
  }, []);

  // ── CLOSE POPOVER ON OUTSIDE CLICK ───────────────────────────────────────
  useEffect(() => {
    const handle = (e) => {
      if (popoverRef.current && !popoverRef.current.contains(e.target)) {
        setSelected(null); setPopoverPos(null);
      }
    };
    if (selected !== null) document.addEventListener("mousedown", handle);
    return () => document.removeEventListener("mousedown", handle);
  }, [selected]);

  const setStudents = useCallback((updater) => {
    setAllPeriodData(prev => {
      const current = prev[activePeriod];
      const next = typeof updater === "function" ? updater(current) : updater;
      const updated = { ...prev, [activePeriod]: next };
      savePeriodDataLocal(activePeriod, next);
      return updated;
    });
  }, [activePeriod]);

  const snapshot = () => {
    setHistory(h => [...h.slice(-19), { period: activePeriod, data: JSON.parse(JSON.stringify(allPeriodData)) }]);
  };

  const undo = () => {
    if (history.length === 0) return;
    const prev = history[history.length - 1];
    setHistory(h => h.slice(0, -1));
    setAllPeriodData(prev.data);
    PERIODS.forEach(p => savePeriodDataLocal(p, prev.data[p]));
    setUndoToast(null);
  };

  const showUndoMsg = (label) => {
    if (undoToast?.timeout) clearTimeout(undoToast.timeout);
    const timeout = setTimeout(() => setUndoToast(null), 4000);
    setUndoToast({ label, timeout });
  };

  const toggleAttendance = (idx) => {
    setStudents(prev => prev.map((s, i) => i !== idx ? s : { ...s, attendance: s.attendance === "present" ? "absent" : "present" }));
  };

  const award = (studentIdx, cat) => {
    if (students[studentIdx].attendance !== "present") return;
    snapshot();
    setStudents(prev => prev.map((s, i) => i !== studentIdx ? s : {
      ...s,
      points: s.points + cat.points,
      log: [{ label:cat.label, pts:cat.points, emoji:cat.emoji, time:getTimeStr(), date:getShortDateStr() }, ...s.log],
    }));
    showUndoMsg(`${cat.emoji} ${cat.label} → ${students[studentIdx].name}`);
  };

  const awardAll = (cat) => {
    snapshot();
    const time = getTimeStr(); const date = getShortDateStr();
    const batchId = Date.now().toString();
    setStudents(prev => prev.map(s => s.attendance !== "present" ? s : {
      ...s, points:s.points+cat.points, log:[{label:cat.label,pts:cat.points,emoji:cat.emoji,time,date,batchId},...s.log]
    }));
    setGiveAllHistory(prev => [...prev, { id: batchId, cat, time }]);
    showUndoMsg(`${cat.emoji} ${cat.label} → All present`);
    setFlashAll(cat.id);
    setTimeout(() => setFlashAll(null), 800);
  };

  const removeLogEntry = (studentIdx, logIdx) => {
    snapshot();
    setStudents(prev => prev.map((s, i) => {
      if (i !== studentIdx) return s;
      const entry = s.log[logIdx];
      if (!entry) return s;
      return { ...s, points: s.points - entry.pts, log: s.log.filter((_, li) => li !== logIdx) };
    }));
    showUndoMsg(`Removed entry from ${students[studentIdx].name}`);
  };

  const removeLogEntryByBatch = (studentIdx, batchId) => {
    snapshot();
    setStudents(prev => prev.map((s, i) => {
      if (i !== studentIdx) return s;
      const entry = s.log.find(l => l.batchId === batchId);
      if (!entry) return s;
      return { ...s, points: s.points - entry.pts, log: s.log.filter(l => !(l.batchId === batchId && l === entry)) };
    }));
  };

  const addStudent = () => {
    const trimmed = newName.trim();
    if (!trimmed) return;
    snapshot();
    setStudents(prev => [...prev, { name:trimmed, points:0, log:[], attendance:"absent", notes:"", parentNote:"", history:[], totalPoints:0 }]);
    setNewName("");
  };

  const removeStudent = (idx) => {
    snapshot();
    setStudents(prev => prev.filter((_,i) => i !== idx));
    if (selected === idx) setSelected(null);
  };

  const endDay = () => {
    snapshot();
    const today = getTodayDateStr();
    const newData = performDayRollover(allPeriodData, today);
    setAllPeriodData(newData);
    setSelected(null);
    setGiveAllHistory([]);
    showUndoMsg("Day archived — totals kept, daily points reset");
  };

  const resetAll = () => {
    snapshot();
    setStudents(prev => prev.map(s => ({ ...s, points:0, log:[], history:[], totalPoints:0 })));
    setSelected(null);
    setGiveAllHistory([]);
    showUndoMsg("All data cleared");
  };

  const masterReset = () => {
    const newData = {};
    PERIODS.forEach(p => {
      newData[p] = (allPeriodData[p] || []).map(s => ({
        ...s, points:0, log:[], history:[], totalPoints:0, attendance:"absent", parentNote:"", notes:""
      }));
      savePeriodDataLocal(p, newData[p]);
    });
    setAllPeriodData(newData);
    setSelected(null);
    setGiveAllHistory([]);
    setShowSemesterReset(false);
    showUndoMsg("Semester reset — all data cleared, roster kept");
  };

  const saveNote = () => {
    if (editNoteFor === null) return;
    setStudents(prev => prev.map((s,i) => i === editNoteFor ? { ...s, parentNote: noteText } : s));
    setEditNoteFor(null); setNoteText("");
  };

  const handleRosterImport = (rosterByPeriod) => {
    snapshot();
    const newData = {};
    PERIODS.forEach(p => {
      const incoming = rosterByPeriod[p] || [];
      if (incoming.length === 0) { newData[p] = allPeriodData[p] || []; return; }
      newData[p] = incoming;
      savePeriodDataLocal(p, newData[p]);
    });
    setAllPeriodData(newData);
    showUndoMsg("Roster imported — existing students replaced");
  };

  const exportData = () => {
    const payload = { version: 1, exported: new Date().toISOString(), periods: allPeriodData };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "participation-data-" + new Date().toLocaleDateString("en-US").replace(/\//g,"-") + ".json";
    a.click();
    URL.revokeObjectURL(url);
  };

  const importData = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        const data = parsed.periods || parsed;
        snapshot();
        const newData = {};
        PERIODS.forEach(p => {
          if (data[p]) { newData[p] = data[p]; savePeriodDataLocal(p, data[p]); }
          else { newData[p] = allPeriodData[p]; }
        });
        setAllPeriodData(newData);
        showUndoMsg("Data imported successfully");
      } catch(err) { alert("Could not read file."); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const periodSummary = PERIODS.map(p => {
    const d = allPeriodData[p] || [];
    return { p, present: d.filter(s=>s.attendance==="present").length, total:d.length, pts:d.reduce((a,s)=>a+s.points,0), total_pts:d.reduce((a,s)=>a+(s.totalPoints||0)+s.points,0) };
  });

  const getLastName = (name) => { const parts = name.trim().split(/[, ]+/); return parts[0].toLowerCase(); };
  const getFirstName = (name) => { const parts = name.trim().split(/[, ]+/); return (parts.length > 1 ? parts[parts.length-1] : parts[0]).toLowerCase(); };
  const sortStudents = (arr) => {
    if (sortBy === "first") return [...arr].sort((a,b) => getFirstName(a.name).localeCompare(getFirstName(b.name)));
    if (sortBy === "last")  return [...arr].sort((a,b) => getLastName(a.name).localeCompare(getLastName(b.name)));
    return arr; // roster order
  };
  const displayStudents = sortStudents(students.map((s,i) => ({ ...s, origIdx:i })));
  const sorted = [...displayStudents].sort((a,b) => b.points - a.points);

  // Cloud status display
  const cloudStatusDisplay = {
    loading: { label: "Loading from cloud…", color: "#FFD166" },
    saving:  { label: "Saving to cloud…",    color: "#FFD166" },
    synced:  { label: "☁️ Synced",            color: "#7EC8A4" },
    error:   { label: "⚠️ Cloud error — saved locally", color: "#E05C5C" },
    offline: { label: "Offline — saved locally", color: "#E8934A" },
  };
  const cs = cloudStatusDisplay[cloudStatus] || cloudStatusDisplay.synced;

  return (
    <div style={{ fontFamily:"'Segoe UI',system-ui,sans-serif", minHeight:"100vh", background:"#F0F2F6" }}>

      {/* ── TOP HEADER ── */}
      <div className="no-print" style={{ background:"linear-gradient(135deg,#1A1A2E 0%,#16213E 100%)", color:"white", padding:"16px 20px 0" }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:10, marginBottom:12 }}>
          <div>
            <div style={{ fontSize:10, letterSpacing:3, textTransform:"uppercase", color:"#7EC8A4", fontWeight:600 }}>Classroom Tool</div>
            <h1 style={{ margin:0, fontSize:20, fontWeight:700, letterSpacing:-0.5 }}>Participation Tracker</h1>
            <div style={{ fontSize:10, marginTop:2, color: cs.color, transition:"color 0.3s" }}>
              {cs.label} · {getTodayDateStr()}
            </div>
          </div>
          <div style={{ display:"flex", gap:8, flexWrap:"wrap", alignItems:"center" }}>
            <div style={{ background:"rgba(255,255,255,0.08)", borderRadius:8, padding:"4px 6px", display:"flex", gap:4 }}>
              {["grid","leaderboard"].map(v => (
                <button key={v} onClick={() => setView(v)} style={{ background:view===v?"rgba(255,255,255,0.15)":"transparent", color:"white", border:"none", borderRadius:6, padding:"5px 12px", fontSize:12, cursor:"pointer", fontWeight:view===v?700:400 }}>
                  {v === "grid" ? "🗂 Grid" : "🏆 Rank"}
                </button>
              ))}
            </div>
            <button onClick={() => setShowRosterImport(true)}
              style={{ background:"rgba(255,209,102,0.2)", color:"#FFD166", border:"1px solid rgba(255,209,102,0.5)", borderRadius:8, padding:"7px 14px", fontSize:13, fontWeight:700, cursor:"pointer" }}>
              👥 Import Roster
            </button>
            <button onClick={() => setShowReport(true)}
              style={{ background:"rgba(76,155,130,0.25)", color:"#7EC8A4", border:"1px solid rgba(76,155,130,0.5)", borderRadius:8, padding:"7px 14px", fontSize:13, fontWeight:700, cursor:"pointer" }}>
              📋 Reports
            </button>
            <button onClick={exportData}
              style={{ background:"rgba(91,141,217,0.25)", color:"#8BB4E8", border:"1px solid rgba(91,141,217,0.5)", borderRadius:8, padding:"7px 14px", fontSize:13, fontWeight:700, cursor:"pointer" }}>
              💾 Export
            </button>
            <label style={{ background:"rgba(155,109,209,0.25)", color:"#C4A0E8", border:"1px solid rgba(155,109,209,0.5)", borderRadius:8, padding:"7px 14px", fontSize:13, fontWeight:700, cursor:"pointer" }}>
              📂 Import
              <input type="file" accept=".json" onChange={importData} style={{ display:"none" }} />
            </label>
            <button onClick={undo} disabled={history.length===0}
              style={{ background:history.length>0?"rgba(255,209,102,0.2)":"rgba(255,255,255,0.05)", color:history.length>0?"#FFD166":"rgba(255,255,255,0.25)", border:`1px solid ${history.length>0?"#FFD166":"rgba(255,255,255,0.1)"}`, borderRadius:8, padding:"7px 14px", fontSize:13, cursor:history.length>0?"pointer":"default", fontWeight:600 }}>
              ↩ Undo
            </button>
            {showEndDayConfirm ? (
              <div style={{ display:"flex", gap:6, alignItems:"center", background:"rgba(224,92,92,0.2)", border:"1px solid #E05C5C", borderRadius:8, padding:"4px 8px" }}>
                <span style={{ fontSize:11, color:"#FFB3B3" }}>Archive today?</span>
                <button onClick={() => { endDay(); setShowEndDayConfirm(false); }} style={{ background:"#4C9B82", color:"white", border:"none", borderRadius:6, padding:"4px 10px", fontSize:12, fontWeight:700, cursor:"pointer" }}>✓ Archive Now</button>
                <button onClick={resetAll} style={{ background:"#E05C5C", color:"white", border:"none", borderRadius:6, padding:"4px 10px", fontSize:12, fontWeight:700, cursor:"pointer" }}>✕ Clear All</button>
                <button onClick={() => setShowEndDayConfirm(false)} style={{ background:"rgba(255,255,255,0.1)", color:"white", border:"none", borderRadius:6, padding:"4px 10px", fontSize:12, cursor:"pointer" }}>Cancel</button>
              </div>
            ) : (
              <button onClick={() => setShowEndDayConfirm(true)}
                style={{ background:"rgba(255,255,255,0.08)", color:"rgba(255,255,255,0.55)", border:"1px solid rgba(255,255,255,0.15)", borderRadius:8, padding:"7px 14px", fontSize:13, cursor:"pointer" }}>
                ↺ Archive Day
              </button>
            )}
            <button onClick={() => setShowSemesterReset(true)}
              style={{ background:"rgba(255,209,102,0.15)", color:"#FFD166", border:"1px solid rgba(255,209,102,0.4)", borderRadius:8, padding:"7px 14px", fontSize:13, cursor:"pointer", fontWeight:600 }}>
              🔄 New Semester
            </button>
            <button onClick={onLogout}
              style={{ background:"rgba(224,92,92,0.2)", color:"#FFB3B3", border:"1px solid rgba(224,92,92,0.4)", borderRadius:8, padding:"7px 14px", fontSize:13, cursor:"pointer", fontWeight:600 }}>
              🔒 Sign Out
            </button>
          </div>
        </div>

        {/* ── PERIOD TABS ── */}
        <div style={{ display:"flex", gap:4, overflowX:"auto" }}>
          {PERIODS.map(p => {
            const ps = periodSummary.find(x => x.p === p);
            const ppc = PERIOD_COLORS[p];
            const isActive = p === activePeriod;
            return (
              <button key={p} onClick={() => { setActivePeriod(p); setSelected(null); setPopoverPos(null); setGiveAllHistory([]); }}
                style={{ background: isActive ? "white" : "rgba(255,255,255,0.07)", color: isActive ? ppc.text : "rgba(255,255,255,0.6)", border:"none", borderRadius:"10px 10px 0 0", padding:"10px 16px", fontSize:13, cursor:"pointer", fontWeight:isActive?700:500, position:"relative", transition:"all 0.15s", flexShrink:0, minWidth:80 }}>
                <div style={{ fontWeight:800, fontSize:14 }}>{p}</div>
                <div style={{ fontSize:10, color: isActive ? ppc.accent : "rgba(255,255,255,0.4)", marginTop:1 }}>
                  {ps?.present}/{ps?.total} · <span style={{ color: isActive ? "#9B6DD1" : "rgba(155,109,209,0.7)" }}>{ps?.total_pts} total</span>
                </div>
                {isActive && <div style={{ position:"absolute", bottom:0, left:"50%", transform:"translateX(-50%)", width:24, height:3, background:ppc.accent, borderRadius:"2px 2px 0 0" }} />}
              </button>
            );
          })}
        </div>
      </div>

      {/* ── GIVE ALL STRIP ── */}
      <div className="no-print" style={{ background:"white", borderBottom:"1px solid #E8EBF0", padding:"10px 20px", display:"flex", gap:10, alignItems:"center", flexWrap:"wrap" }}>
        <div style={{ fontSize:12, fontWeight:700, color:"#555", whiteSpace:"nowrap" }}>👥 Give all:</div>
        {CATEGORIES.filter(c => ["entrance","turntalk","offtask"].includes(c.id)).map(cat => (
          <button key={cat.id} onClick={() => awardAll(cat)}
            style={{ background:flashAll===cat.id?cat.color:`${cat.color}18`, color:flashAll===cat.id?"white":cat.color, border:`1.5px solid ${cat.color}`, borderRadius:8, padding:"5px 12px", fontSize:12, fontWeight:700, cursor:"pointer", transition:"all 0.15s" }}>
            {cat.emoji} {cat.label} <span style={{ opacity:0.7 }}>({cat.points>0?"+":""}{cat.points} all)</span>
          </button>
        ))}
        <div style={{ marginLeft:"auto", display:"flex", gap:8, flexWrap:"wrap" }}>
          {CATEGORIES.map(c => (
            <div key={c.id} style={{ display:"flex", alignItems:"center", gap:4, fontSize:11, color:"#888" }}>
              <div style={{ width:7, height:7, borderRadius:"50%", background:c.color }} />
              {c.emoji} <span style={{ color:c.points>0?"#2E7D5E":"#C0392B", fontWeight:700 }}>{c.points>0?"+":""}{c.points}</span>
            </div>
          ))}
        </div>
      </div>

      <div style={{ padding:"16px 20px", maxWidth:1100, margin:"0 auto" }}>

        {/* ── LOADING OVERLAY ── */}
        {cloudStatus === "loading" && (
          <div style={{ textAlign:"center", padding:"40px 20px", color:"#888" }}>
            <div style={{ fontSize:32, marginBottom:12 }}>☁️</div>
            <div style={{ fontSize:15, fontWeight:600 }}>Loading your data from the cloud…</div>
            <div style={{ fontSize:12, marginTop:6 }}>This only takes a moment</div>
          </div>
        )}

        {cloudStatus !== "loading" && (
          <>
            {/* ── GIVE ALL QUICK-UNDO ── */}
            {giveAllHistory.length > 0 && (
              <div className="no-print" style={{ marginBottom:14 }}>
                {[...giveAllHistory].reverse().map(batch => {
                  const remainingCount = students.filter(s => s.log.some(l => l.batchId === batch.id)).length;
                  if (remainingCount === 0) return null;
                  return (
                    <div key={batch.id} style={{ background:"#FFFBEA", border:"1.5px solid #FFD166", borderRadius:12, padding:"10px 14px", marginBottom:8 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8, flexWrap:"wrap" }}>
                        <span style={{ fontSize:13 }}>{batch.cat.emoji}</span>
                        <span style={{ fontSize:12, fontWeight:700, color:"#7A5200" }}>Give All — {batch.cat.label}</span>
                        <span style={{ fontSize:11, color:"#bbb" }}>{batch.time}</span>
                        <span style={{ fontSize:11, color:"#aaa", background:"#FFF3CD", borderRadius:5, padding:"1px 8px", border:"1px solid #FFD166" }}>{remainingCount} remaining</span>
                        <button onClick={() => setGiveAllHistory(prev => prev.filter(b => b.id !== batch.id))}
                          style={{ marginLeft:"auto", background:"none", border:"none", color:"#ccc", fontSize:13, cursor:"pointer" }}>✕</button>
                      </div>
                      <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                        {students.map((s, i) => {
                          const hasEntry = s.log.some(l => l.batchId === batch.id);
                          if (s.attendance !== "present") return null;
                          return (
                            <button key={i} onClick={() => { if (hasEntry) removeLogEntryByBatch(i, batch.id); }} disabled={!hasEntry}
                              style={{ background: hasEntry ? "#FFF1F1" : "#F8FCF9", border: `1.5px solid ${hasEntry ? "#E05C5C70" : "#B8DDD0"}`, borderRadius:8, padding:"5px 12px", fontSize:12, cursor: hasEntry ? "pointer" : "default", color: hasEntry ? "#C0392B" : "#7EC8A4", fontWeight:700, display:"flex", alignItems:"center", gap:5 }}>
                              <span>{hasEntry ? "↩" : "✓"}</span>
                              {s.name}
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* ── ATTENDANCE + ADD ── */}
            <div className="no-print" style={{ display:"flex", gap:10, marginBottom:14, flexWrap:"wrap", alignItems:"center" }}>
              <div style={{ background:"white", borderRadius:12, border:"1px solid #E8EBF0", padding:"10px 16px", display:"flex", alignItems:"center", gap:12, flexShrink:0, flex:1 }}>
                <span style={{ fontSize:12, fontWeight:700, color:"#555" }}>📋 {activePeriod} Attendance</span>
                <span style={{ color:"#4C9B82", fontWeight:700, fontSize:13 }}>✅ {students.filter(s=>s.attendance==="present").length}</span>
                <span style={{ color:"#E05C5C", fontWeight:700, fontSize:13 }}>❌ {students.filter(s=>s.attendance!=="present").length}</span>
                <button onClick={() => { snapshot(); setStudents(prev => prev.map(s => ({ ...s, attendance:"present" }))); showUndoMsg("All marked present"); }}
                  style={{ background:`${pc.accent}18`, color:pc.accent, border:`1px solid ${pc.accent}`, borderRadius:8, padding:"4px 12px", fontSize:12, fontWeight:700, cursor:"pointer" }}>
                  ✅ All Present
                </button>
                <button onClick={() => { snapshot(); setStudents(prev => prev.map(s => ({ ...s, attendance:"absent" }))); }}
                  style={{ background:"#FFF1F1", color:"#E05C5C", border:"1px solid #E05C5C60", borderRadius:8, padding:"4px 12px", fontSize:12, cursor:"pointer" }}>
                  Clear
                </button>
                <div style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:6 }}>
                  <span style={{ fontSize:11, color:"#aaa", fontWeight:600 }}>Sort:</span>
                  {[["roster","📋 Roster"],["first","A–Z First"],["last","A–Z Last"]].map(([val,label]) => (
                    <button key={val} onClick={() => setSortBy(val)}
                      style={{ background:sortBy===val?"#1A1A2E":"white", color:sortBy===val?"white":"#666", border:`1.5px solid ${sortBy===val?"#1A1A2E":"#E0E4EC"}`, borderRadius:7, padding:"4px 10px", fontSize:11, fontWeight:sortBy===val?700:400, cursor:"pointer" }}>
                      {label}
                    </button>
                  ))}
                </div>
              </div>
              <div style={{ display:"flex", gap:8, flexShrink:0 }}>
                <input value={newName} onChange={e => setNewName(e.target.value)} onKeyDown={e => e.key==="Enter" && addStudent()}
                  placeholder="Add student…" style={{ padding:"9px 14px", border:"2px solid #E0E4EC", borderRadius:10, fontSize:13, width:160, outline:"none" }} />
                <button onClick={addStudent} style={{ background:pc.accent, color:"white", border:"none", borderRadius:10, padding:"9px 16px", fontSize:13, fontWeight:700, cursor:"pointer" }}>+ Add</button>
              </div>
            </div>

            {/* ── GRID VIEW ── */}
            {view === "grid" && (
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(155px, 1fr))", gap:10 }}>
                {displayStudents.map((s) => {
                  const i = s.origIdx;
                  const badge = getBadge(s.points);
                  const att = getAttendanceMeta(s.attendance);
                  const flashCat = CATEGORIES.find(c => c.id === flashAll);
                  const totalDisplay = (s.totalPoints || 0) + s.points;
                  return (
                    <div key={i} style={{ background:flashAll?`${flashCat?.color}18`:getCardBg(s.points), border:`2px solid ${flashAll?flashCat?.color:selected===i?pc.accent:"#E8EBF0"}`, borderRadius:12, overflow:"hidden", transition:"all 0.15s", opacity:s.attendance==="absent"?0.65:1, position:"relative" }}>
                      <button onClick={e => { e.stopPropagation(); toggleAttendance(i); }}
                        style={{ width:"100%", display:"flex", alignItems:"center", justifyContent:"space-between", padding:"5px 10px", background:att.bg, border:"none", borderBottom:`1px solid ${att.border}30`, cursor:"pointer", fontSize:10, fontWeight:700, color:att.color }}>
                        <span>{att.icon} {att.label}</span>
                        <span style={{ fontSize:9, color:"#ccc" }}>tap</span>
                      </button>
                      <div onClick={e => {
                        if (s.attendance !== "present") return;
                        if (selected === i) { setSelected(null); setPopoverPos(null); return; }
                        const rect = e.currentTarget.parentElement.getBoundingClientRect();
                        setPopoverPos({ top:rect.top+window.scrollY, left:rect.left, width:rect.width, height:rect.height });
                        setSelected(i);
                      }} style={{ padding:"10px 12px 6px", cursor:s.attendance==="present"?"pointer":"default" }}>
                        {badge && <div style={{ position:"absolute", top:32, right:8, fontSize:13 }}>{badge}</div>}
                        <div style={{ fontSize:12, fontWeight:600, color:"#333", marginBottom:4, paddingRight:16 }}>{s.name}</div>
                        <div style={{ fontSize:28, fontWeight:800, color:getPointColor(s.points), lineHeight:1 }}>{s.points>0?"+":""}{s.points}</div>
                        <div style={{ fontSize:9, color:"#aaa", marginTop:1 }}>today</div>
                        <div style={{ fontSize:11, fontWeight:700, color:"#9B6DD1", marginTop:3, minHeight:16 }}>
                          {totalDisplay !== 0 ? `${totalDisplay} total` : <span style={{ color:"#ddd" }}>0 total</span>}
                        </div>
                        {s.parentNote && <div style={{ fontSize:9, color:"#D4A017", marginTop:3 }}>📝 has note</div>}
                      </div>
                      <div style={{ display:"flex", justifyContent:"space-between", padding:"4px 10px 6px", borderTop:"1px solid #EEE" }}>
                        <button onClick={e => { e.stopPropagation(); setShowLog(showLog===i?null:i); }}
                          style={{ background:"none", border:"none", fontSize:10, color:"#888", cursor:"pointer", padding:0 }}>
                          📋 {s.log.length}
                        </button>
                        <button onClick={e => { e.stopPropagation(); setEditNoteFor(i); setNoteText(s.parentNote||""); }}
                          style={{ background:"none", border:"none", fontSize:10, color:"#D4A017", cursor:"pointer", padding:0 }}>✏️</button>
                        <button onClick={e => { e.stopPropagation(); removeStudent(i); }}
                          style={{ background:"none", border:"none", fontSize:10, color:"#ddd", cursor:"pointer", padding:0 }}>✕</button>
                      </div>
                      {showLog === i && s.log.length > 0 && (
                        <div style={{ padding:"0 10px 8px", fontSize:11, color:"#555" }}>
                          <div style={{ fontSize:9, color:"#bbb", textTransform:"uppercase", letterSpacing:1, padding:"4px 0 2px", fontWeight:700 }}>Tap ↩ to remove</div>
                          {s.log.slice(0,6).map((entry,ei) => {
                            const eColor = entry.pts > 0 ? "#2E7D5E" : "#C0392B";
                            return (
                              <div key={ei} style={{ display:"flex", alignItems:"center", gap:4, padding:"3px 0", borderBottom:"1px solid #f0f0f0" }}>
                                <div style={{ flex:1 }}>
                                  <div style={{ display:"flex", justifyContent:"space-between" }}>
                                    <span>{entry.emoji} {entry.label}</span>
                                    <span style={{ color:eColor, fontWeight:700 }}>{entry.pts > 0 ? "+" : ""}{entry.pts}</span>
                                  </div>
                                  <div style={{ color:"#bbb", fontSize:9 }}>{entry.date} · {entry.time}</div>
                                </div>
                                <button onClick={e => { e.stopPropagation(); removeLogEntry(i, ei); }}
                                  style={{ background:"#FFF1F1", border:"1px solid #E05C5C60", borderRadius:5, color:"#E05C5C", fontSize:10, fontWeight:700, padding:"2px 6px", cursor:"pointer", flexShrink:0 }}>↩</button>
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}

            {/* ── LEADERBOARD VIEW ── */}
            {view === "leaderboard" && (
              <div style={{ background:"white", borderRadius:14, overflow:"hidden", boxShadow:"0 4px 20px rgba(0,0,0,0.07)" }}>
                <div style={{ padding:"12px 20px", background:"#F8F9FC", borderBottom:"1px solid #E8EBF0", display:"grid", gridTemplateColumns:"36px 1fr 70px 120px 90px", gap:10, fontSize:10, fontWeight:700, color:"#999", textTransform:"uppercase", letterSpacing:1 }}>
                  <div>#</div><div>Student</div><div style={{ textAlign:"center" }}>Events</div><div style={{ textAlign:"center" }}>Attendance</div><div style={{ textAlign:"right" }}>Points</div>
                </div>
                {sorted.map((s, rank) => {
                  const medal = rank===0?"🥇":rank===1?"🥈":rank===2?"🥉":null;
                  const att = getAttendanceMeta(s.attendance);
                  const totalDisplay = (s.totalPoints || 0) + s.points;
                  return (
                    <div key={s.origIdx} style={{ display:"grid", gridTemplateColumns:"36px 1fr 70px 120px 90px", gap:10, padding:"0 20px", borderBottom:"1px solid #F0F2F6", background:rank<3?"#FAFBFF":"white", alignItems:"center", opacity:s.attendance==="absent"?0.55:1 }}>
                      <div style={{ fontSize:14, textAlign:"center", padding:"12px 0" }}>{medal||<span style={{ color:"#ccc", fontSize:12 }}>{rank+1}</span>}</div>
                      <div style={{ fontWeight:600, fontSize:13, cursor:s.attendance==="present"?"pointer":"default", padding:"12px 0" }}
                        onClick={e => {
                          if (s.attendance !== "present") return;
                          if (selected===s.origIdx) { setSelected(null); setPopoverPos(null); return; }
                          const rect = e.currentTarget.closest("[style]").getBoundingClientRect();
                          setPopoverPos({ top:rect.top+window.scrollY, left:rect.left, width:rect.width, height:rect.height });
                          setSelected(s.origIdx);
                        }}>
                        {s.name} {getBadge(s.points) && <span style={{ fontSize:12 }}>{getBadge(s.points)}</span>}
                        <span style={{ display:"block", fontSize:9, color:"#aaa", fontWeight:400 }}>{s.attendance==="present"?"tap to award":"mark present first"}</span>
                      </div>
                      <div style={{ textAlign:"center", fontSize:12, color:"#888" }}>{s.log.length}</div>
                      <div style={{ textAlign:"center", padding:"8px 0" }}>
                        <button onClick={() => toggleAttendance(s.origIdx)}
                          style={{ background:att.bg, border:`1px solid ${att.border}`, borderRadius:8, padding:"4px 10px", fontSize:11, fontWeight:700, color:att.color, cursor:"pointer" }}>
                          {att.icon} {att.label}
                        </button>
                      </div>
                      <div style={{ textAlign:"right", padding:"10px 0" }}>
                        <div style={{ fontWeight:800, fontSize:17, color:getPointColor(s.points) }}>{s.points>0?"+":""}{s.points}</div>
                        <div style={{ fontSize:9, color:"#aaa" }}>today</div>
                        <div style={{ fontSize:11, fontWeight:700, color:"#9B6DD1" }}>{totalDisplay} total</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* ── ACTIVITY SUMMARY ── */}
            <div style={{ marginTop:16, display:"flex", gap:10, flexWrap:"wrap" }}>
              {CATEGORIES.map(cat => {
                const count = students.reduce((acc,s) => acc + s.log.filter(l=>l.label===cat.label).length, 0);
                return (
                  <div key={cat.id} style={{ background:"white", borderRadius:10, padding:"8px 14px", border:`1.5px solid ${cat.color}20`, fontSize:12, display:"flex", alignItems:"center", gap:6 }}>
                    <span>{cat.emoji}</span>
                    <span style={{ color:"#555" }}>{cat.label}</span>
                    <span style={{ fontWeight:700, color:cat.color }}>{count}×</span>
                  </div>
                );
              })}
            </div>

            {/* ── ABSENT LIST ── */}
            <div className="no-print" style={{ marginTop:14, background:"white", borderRadius:12, border:"1.5px solid #E05C5C30", padding:"12px 16px" }}>
              <div style={{ fontSize:12, fontWeight:700, color:"#E05C5C", marginBottom:8 }}>
                ❌ Absent / Unmarked — {activePeriod} ({students.filter(s=>s.attendance!=="present").length})
              </div>
              <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                {students.filter(s=>s.attendance!=="present").length===0 ? (
                  <div style={{ fontSize:12, color:"#aaa" }}>✅ All marked present</div>
                ) : (
                  students.map((s,origI) => s.attendance!=="present" ? (
                    <button key={origI} onClick={() => toggleAttendance(origI)}
                      style={{ background:"#FFF1F1", border:"1px solid #E05C5C40", borderRadius:8, padding:"5px 12px", fontSize:12, cursor:"pointer" }}>
                      <span style={{ fontWeight:600, color:"#C0392B" }}>{s.name}</span>
                      <span style={{ color:"#aaa", fontSize:10, marginLeft:6 }}>tap → present</span>
                    </button>
                  ) : null)
                )}
              </div>
            </div>
          </>
        )}
      </div>

      {/* ── AWARD POPOVER ── */}
      {selected !== null && popoverPos && ReactDOM.createPortal(
        <div ref={popoverRef} style={{
          position:"absolute",
          top:(() => {
            const panelH = 180;
            const spaceBelow = document.documentElement.scrollHeight - (popoverPos.top + popoverPos.height);
            return spaceBelow > panelH ? popoverPos.top + popoverPos.height + 6 : popoverPos.top - panelH - 6;
          })(),
          left: Math.min(Math.max(popoverPos.left, 8), window.innerWidth - 320),
          width: Math.min(310, window.innerWidth - 16),
          background:"white", borderRadius:12, border:`2px solid ${pc.accent}`,
          padding:"10px 12px", boxShadow:"0 6px 24px rgba(0,0,0,0.15)", zIndex:1000,
        }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
            <div style={{ fontWeight:700, fontSize:12, color:pc.accent }}>
              🏅 {students[selected]?.name}
              <span style={{ background:pc.bg, color:pc.text, fontSize:9, borderRadius:4, padding:"1px 6px", marginLeft:6 }}>{activePeriod}</span>
            </div>
            <button onClick={() => { setSelected(null); setPopoverPos(null); }} style={{ background:"none", border:"none", fontSize:14, cursor:"pointer", color:"#aaa" }}>✕</button>
          </div>
          <div style={{ display:"flex", gap:6, alignItems:"flex-start" }}>
            <div style={{ display:"flex", gap:5, flexWrap:"wrap", flex:1 }}>
              {CATEGORIES.filter(c => c.id !== "offtask").map(cat => (
                <button key={cat.id} onClick={e => { e.stopPropagation(); award(selected, cat); }}
                  style={{ background:cat.color, color:"white", border:"none", borderRadius:7, padding:"5px 9px", fontSize:11, fontWeight:600, cursor:"pointer", display:"flex", alignItems:"center", gap:4, boxShadow:"0 1px 4px rgba(0,0,0,0.12)" }}>
                  {cat.emoji} {cat.label}
                  <span style={{ background:"rgba(255,255,255,0.25)", borderRadius:4, padding:"1px 4px", fontSize:10 }}>+{cat.points}</span>
                </button>
              ))}
            </div>
            <div style={{ width:1, background:"#E8EBF0", alignSelf:"stretch", margin:"0 2px" }} />
            <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
              {[{ id:"offtask", label:"Off-Task/Talking", emoji:"🔇", points:-1, color:"#E05C5C" }, { id:"device", label:"Device", emoji:"📱", points:-1, color:"#888" }].map(cat => (
                <button key={cat.id} onClick={e => { e.stopPropagation(); award(selected, cat); }}
                  style={{ background:cat.color, color:"white", border:"none", borderRadius:7, padding:"5px 9px", fontSize:11, fontWeight:600, cursor:"pointer", display:"flex", alignItems:"center", gap:4, boxShadow:"0 1px 4px rgba(0,0,0,0.12)", whiteSpace:"nowrap" }}>
                  {cat.emoji} {cat.label}
                  <span style={{ background:"rgba(255,255,255,0.25)", borderRadius:4, padding:"1px 4px", fontSize:10 }}>{cat.points}</span>
                </button>
              ))}
            </div>
          </div>
          <div style={{ marginTop:8, display:"flex", justifyContent:"flex-end" }}>
            <button onClick={() => { setSelected(null); setPopoverPos(null); }}
              style={{ background:pc.accent, color:"white", border:"none", borderRadius:7, padding:"5px 14px", fontSize:11, fontWeight:700, cursor:"pointer" }}>
              Done
            </button>
          </div>
        </div>,
        document.body
      )}

      {/* ── UNDO TOAST ── */}
      {undoToast && (
        <div style={{ position:"fixed", bottom:24, left:"50%", transform:"translateX(-50%)", background:"#1A1A2E", color:"white", borderRadius:12, padding:"10px 18px", display:"flex", alignItems:"center", gap:12, boxShadow:"0 6px 24px rgba(0,0,0,0.3)", zIndex:999, fontSize:13, border:"1px solid rgba(255,255,255,0.1)", whiteSpace:"nowrap" }}>
          <span style={{ color:"#aaa" }}>Done: <strong style={{ color:"white" }}>{undoToast.label}</strong></span>
          <button onClick={undo} style={{ background:"#FFD166", color:"#1A1A2E", border:"none", borderRadius:8, padding:"5px 12px", fontWeight:700, fontSize:12, cursor:"pointer" }}>↩ Undo</button>
          <button onClick={() => setUndoToast(null)} style={{ background:"none", border:"none", color:"#666", fontSize:15, cursor:"pointer" }}>✕</button>
        </div>
      )}

      {/* ── ROLLOVER TOAST ── */}
      {rolloverToast && (
        <div style={{ position:"fixed", top:24, left:"50%", transform:"translateX(-50%)", background:"#1B3D2E", color:"white", borderRadius:12, padding:"12px 20px", display:"flex", alignItems:"center", gap:10, boxShadow:"0 6px 24px rgba(0,0,0,0.3)", zIndex:1001, fontSize:13, border:"1px solid #4C9B82", maxWidth:420 }}>
          <span style={{ fontSize:18 }}>🌅</span>
          <div>
            <div style={{ fontWeight:700, color:"#7EC8A4" }}>New day — {getTodayDateStr()}</div>
            <div style={{ fontSize:11, color:"rgba(255,255,255,0.6)", marginTop:2 }}>{rolloverToast.date}'s data archived. Daily points reset, totals kept.</div>
          </div>
          <button onClick={() => setRolloverToast(null)} style={{ background:"none", border:"none", color:"#666", fontSize:16, cursor:"pointer", marginLeft:8 }}>✕</button>
        </div>
      )}

      {/* ── PARENT NOTE MODAL ── */}
      {editNoteFor !== null && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.5)", zIndex:2000, display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}>
          <div style={{ background:"white", borderRadius:16, padding:24, maxWidth:400, width:"100%", boxShadow:"0 20px 60px rgba(0,0,0,0.3)" }}>
            <h3 style={{ margin:"0 0 6px", fontSize:16 }}>📝 Parent Note</h3>
            <div style={{ fontSize:13, color:"#888", marginBottom:14 }}>For <strong>{students[editNoteFor]?.name}</strong> · Appears on printed report</div>
            <textarea value={noteText} onChange={e => setNoteText(e.target.value)}
              placeholder="e.g. 'Called home 6/12. Parent aware of missing work.'"
              rows={4} style={{ width:"100%", padding:"10px 12px", border:"2px solid #E0E4EC", borderRadius:10, fontSize:14, resize:"vertical", outline:"none" }} />
            <div style={{ display:"flex", gap:8, marginTop:14, justifyContent:"flex-end" }}>
              <button onClick={() => { setEditNoteFor(null); setNoteText(""); }} style={{ background:"none", border:"2px solid #E0E4EC", borderRadius:9, padding:"8px 18px", fontSize:13, cursor:"pointer" }}>Cancel</button>
              <button onClick={saveNote} style={{ background:"#4C9B82", color:"white", border:"none", borderRadius:9, padding:"8px 20px", fontSize:13, fontWeight:700, cursor:"pointer" }}>Save Note</button>
            </div>
          </div>
        </div>
      )}

      {/* ── SEMESTER RESET MODAL ── */}
      {showSemesterReset && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.6)", zIndex:3000, display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}>
          <div style={{ background:"white", borderRadius:20, padding:32, maxWidth:420, width:"100%", boxShadow:"0 24px 64px rgba(0,0,0,0.35)" }}>
            <div style={{ fontSize:40, textAlign:"center", marginBottom:16 }}>🔄</div>
            <h2 style={{ margin:"0 0 10px", fontSize:20, fontWeight:800, color:"#1A1A2E", textAlign:"center" }}>New Semester Reset</h2>
            <p style={{ fontSize:13, color:"#666", textAlign:"center", lineHeight:1.6, marginBottom:20 }}>
              This will <strong>permanently delete</strong> all points, logs, and history for every student across all periods.<br/><br/>
              <span style={{ color:"#4C9B82", fontWeight:700 }}>✅ Your roster (student names) will be kept.</span>
            </p>
            <div style={{ background:"#FFF1F1", border:"1px solid #E05C5C40", borderRadius:10, padding:"10px 14px", fontSize:12, color:"#C0392B", marginBottom:20, textAlign:"center" }}>
              ⚠️ This cannot be undone. Export your data first if you want a backup.
            </div>
            <div style={{ display:"flex", gap:10 }}>
              <button onClick={() => setShowSemesterReset(false)}
                style={{ flex:1, background:"none", border:"2px solid #E0E4EC", borderRadius:10, padding:"11px", fontSize:14, cursor:"pointer", color:"#666", fontWeight:600 }}>
                Cancel
              </button>
              <button onClick={masterReset}
                style={{ flex:1, background:"#E05C5C", color:"white", border:"none", borderRadius:10, padding:"11px", fontSize:14, fontWeight:700, cursor:"pointer" }}>
                Yes, Reset Everything
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── ROSTER IMPORT MODAL ── */}
      {showRosterImport && (
        <ImportRosterModal
          onClose={() => setShowRosterImport(false)}
          onImport={handleRosterImport}
        />
      )}

      {/* ── REPORTS MODAL ── */}
      {showReport && ReactDOM.createPortal(
        <ParentReportModal allPeriodData={allPeriodData} onClose={() => setShowReport(false)} onPrint={(html) => { window.triggerPrint(html); }} />,
        document.body
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>

<script>
window.triggerPrint = function(html) {
  var div = document.createElement("div");
  div.id = "pt-print-root";
  div.style.cssText = "font-family:'Segoe UI',sans-serif;padding:24px;color:#1A1A2E;background:white";
  div.innerHTML = html;
  document.body.appendChild(div);
  var style = document.createElement("style");
  style.textContent = "@media print{body *{display:none!important}#pt-print-root,#pt-print-root *{display:revert!important}@page{margin:1.5cm}}";
  document.head.appendChild(style);
  window.print();
  document.body.removeChild(div);
  document.head.removeChild(style);
};
</script>
</body>
</html>
