<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Participation Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #F5F7FA; color: #1A1A2E; }
    button { font-family: inherit; }
    input { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const CATEGORIES = [
      { id: "entrance", label: "Entrance Ticket", emoji: "🎫", points: 1, color: "#4C9B82" },
      { id: "turntalk", label: "Turn and Talk", emoji: "🗣️", points: 1, color: "#E8934A" },
      { id: "reasoning", label: "Answer + Reasoning", emoji: "🧠", points: 1, color: "#5B8DD9" },
      { id: "vocab", label: "Question + Vocabulary", emoji: "📚", points: 1, color: "#9B6DD1" },
      { id: "sharework", label: "Share Work Publicly", emoji: "🌟", points: 1, color: "#D4A017" },
      { id: "offtask", label: "Off-Task Talking", emoji: "🔇", points: -1, color: "#E05C5C" },
    ];

    const DEFAULT_STUDENTS = [
      "Aaliyah", "Brandon", "Celeste", "David", "Esther",
      "Felix", "Grace", "Henry", "Isabel", "James",
      "Kira", "Leo", "Maya", "Nathan", "Olivia",
    ];

    const STORAGE_KEY = "participation_tracker_students";

    const POINTS_KEY = "participation_tracker_points";
    const EXPORT_KEY = "participation_tracker_export";

    const loadStudents = () => {
      const today = new Date().toLocaleDateString([], { weekday: "short", month: "short", day: "numeric", year: "numeric" });
      let savedPoints = {};
      try {
        const raw = localStorage.getItem(POINTS_KEY);
        if (raw) savedPoints = JSON.parse(raw);
      } catch (e) {}
      return DEFAULT_STUDENTS.map((name) => ({
        name,
        points: savedPoints[name] || 0,
        log: [],
        attendance: "absent",
        absentDate: today,
      }));
    };

    function App() {
      const [students, setStudents] = useState(loadStudents);
      const [history, setHistory] = useState([]);
      const [selected, setSelected] = useState(null);
      const [popoverPos, setPopoverPos] = useState(null);
      const popoverRef = useRef(null);
      const [newName, setNewName] = useState("");
      const [view, setView] = useState("grid");
      const [showLog, setShowLog] = useState(null);
      const [flashAll, setFlashAll] = useState(null);
      const [resetConfirm, setResetConfirm] = useState(false);
      const [undoToast, setUndoToast] = useState(null);
      const [savedToast, setSavedToast] = useState(false);

      // Auto-export previous session data on page load (only confirmed, non-undone actions)
      useEffect(() => {
        try {
          const saved = localStorage.getItem(EXPORT_KEY);
          if (saved) {
            const prev = JSON.parse(saved);
            const hasData = prev.some(s => s.points !== 0 || (s.log && s.log.length > 0));
            if (hasData) {
              const rows = [["Date", "Student", "Attendance", "Total Points", "Activity", "Points", "Time"]];
              const today = new Date().toLocaleDateString([], { weekday: "short", month: "short", day: "numeric", year: "numeric" });
              prev.forEach(s => {
                if (!s.log || s.log.length === 0) {
                  rows.push([today, s.name, s.attendance || "—", s.points, "—", "—", "—"]);
                } else {
                  s.log.forEach((entry, i) => {
                    rows.push([entry.date || today, s.name, i === 0 ? (s.attendance || "—") : "", i === 0 ? s.points : "", entry.label, entry.pts, entry.time]);
                  });
                }
              });
              const url = SHEETS_URL + "?data=" + encodeURIComponent(JSON.stringify(rows));
              fetch(url, { mode: "no-cors" }).catch(() => {});
              localStorage.removeItem(EXPORT_KEY);
              setExportToast({ ok: true, msg: "Previous session auto-exported ✓" });
            }
          }
        } catch(e) {}
      }, []);

      useEffect(() => {
        const handleClickOutside = (e) => {
          if (popoverRef.current && !popoverRef.current.contains(e.target)) {
            setSelected(null);
            setPopoverPos(null);
          }
        };
        if (selected !== null) document.addEventListener("mousedown", handleClickOutside);
        return () => document.removeEventListener("mousedown", handleClickOutside);
      }, [selected]);

      const toggleAttendance = (idx) => {
        const today = new Date().toLocaleDateString([], { weekday: "short", month: "short", day: "numeric", year: "numeric" });
        setStudents((prev) => prev.map((s, i) => {
          if (i !== idx) return s;
          const next = s.attendance === "present" ? "absent" : "present";
          return { ...s, attendance: next, absentDate: next === "absent" ? today : s.absentDate };
        }));
      };

      useEffect(() => {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(students));
          // Persist accumulated points separately by name
          const pts = {};
          students.forEach(s => { pts[s.name] = s.points; });
          localStorage.setItem(POINTS_KEY, JSON.stringify(pts));
          setSavedToast(true);
          const t = setTimeout(() => setSavedToast(false), 1500);
          return () => clearTimeout(t);
        } catch (e) {}
      }, [students]);

      const snapshot = (current) => {
        setHistory((h) => [...h.slice(-19), current]);
      };

      const saveExport = (studentList) => {
        try { localStorage.setItem(EXPORT_KEY, JSON.stringify(studentList)); } catch(e) {}
      };

      const showUndoToast = (label) => {
        if (undoToast && undoToast.timeout) clearTimeout(undoToast.timeout);
        const timeout = setTimeout(() => setUndoToast(null), 4000);
        setUndoToast({ label, timeout });
      };

      const undo = () => {
        if (history.length === 0) return;
        const prev = history[history.length - 1];
        setHistory((h) => h.slice(0, -1));
        setStudents(prev);
        setUndoToast(null);
      };

      const award = (studentIdx, cat) => {
        if (students[studentIdx].attendance !== "present") return;
        snapshot(students);
        const now = new Date();
        const next = students.map((s, i) => {
          if (i !== studentIdx) return s;
          return {
            ...s,
            points: s.points + cat.points,
            log: [
              { label: cat.label, pts: cat.points, emoji: cat.emoji, time: now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }), date: now.toLocaleDateString([], { month: "short", day: "numeric" }) },
              ...s.log,
            ],
          };
        });
        setStudents(next);
        saveExport(next);
        showUndoToast(`${cat.emoji} ${cat.label} → ${students[studentIdx].name}`);
      };

      const awardAll = (cat) => {
        snapshot(students);
        const now = new Date();
        const time = now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        const date = now.toLocaleDateString([], { month: "short", day: "numeric" });
        const next = students.map((s) => {
          if (s.attendance !== "present") return s;
          return {
            ...s,
            points: s.points + cat.points,
            log: [{ label: cat.label, pts: cat.points, emoji: cat.emoji, time, date }, ...s.log],
          };
        });
        setStudents(next);
        saveExport(next);
        showUndoToast(`${cat.emoji} ${cat.label} → All students`);
        setFlashAll(cat.id);
        setTimeout(() => setFlashAll(null), 800);
      };

      const addStudent = () => {
        const trimmed = newName.trim();
        if (!trimmed) return;
        snapshot(students);
        const today = new Date().toLocaleDateString([], { weekday: "short", month: "short", day: "numeric", year: "numeric" });
        setStudents((prev) => [...prev, { name: trimmed, points: 0, log: [], attendance: "absent", absentDate: today }]);
        setNewName("");
      };

      const removeStudent = (idx) => {
        snapshot(students);
        setStudents((prev) => prev.filter((_, i) => i !== idx));
        if (selected === idx) setSelected(null);
      };

      const resetAll = () => {
        snapshot(students);
        setStudents(students.map((s) => ({ ...s, points: 0, log: [] })));
        try { localStorage.removeItem(POINTS_KEY); } catch(e) {}
        setSelected(null);
        setResetConfirm(false);
        showUndoToast("All points reset");
      };

      const [exporting, setExporting] = useState(false);
      const [exportToast, setExportToast] = useState(null);

      const SHEETS_URL = "https://script.google.com/macros/s/AKfycbxzaCI3zKNKDJtrMbiKP3l8v5NVOa77_RfrByVTeVRlOe6yFyilHPCr4BqL3PaLcenSYA/exec";

      const buildExportRows = (studentList) => {
        const today = new Date().toLocaleDateString([], { weekday: "short", month: "short", day: "numeric", year: "numeric" });
        const rows = [["Date", "Student", "Attendance", "Total Points", "Activity", "Points", "Time"]];
        studentList.forEach(s => {
          if (s.log.length === 0) {
            rows.push([today, s.name, s.attendance || "—", s.points, "—", "—", "—"]);
          } else {
            s.log.forEach((entry, i) => {
              rows.push([
                entry.date || today,
                s.name,
                i === 0 ? (s.attendance || "—") : "",
                i === 0 ? s.points : "",
                entry.label,
                entry.pts,
                entry.time,
              ]);
            });
          }
        });
        return rows;
      };

      const exportToSheets = (studentList, silent = false) => {
        const rows = buildExportRows(studentList || students);
        const url = SHEETS_URL + "?data=" + encodeURIComponent(JSON.stringify(rows));
        if (silent) {
          fetch(url, { mode: "no-cors" })
            .then(() => setExportToast({ ok: true, msg: "Auto-exported to Google Sheets ✓" }))
            .catch(() => {});
        } else {
          window.open(url, "_blank");
          setExportToast({ ok: true, msg: "Exported to Google Sheets ✓" });
        }
      };

      const sorted = [...students].map((s, i) => ({ ...s, origIdx: i })).sort((a, b) => b.points - a.points);

      const getBadge = (pts) => {
        if (pts >= 5) return { icon: "⭐" };
        if (pts >= 3) return { icon: "🌟" };
        if (pts < 0) return { icon: "⚠️" };
        return null;
      };

      const getCardBg = (pts) => pts >= 5 ? "#FFF8E7" : pts < 0 ? "#FFF1F1" : "#FFFFFF";
      const getPointColor = (pts) => pts > 0 ? "#2E7D5E" : pts < 0 ? "#C0392B" : "#888";

      const getAttendanceLabel = (att) => {
        if (att === "present") return { icon: "✅", label: "Present", color: "#4C9B82", bg: "#E8F5F0", border: "#4C9B82" };
        if (att === "absent") return { icon: "❌", label: "Absent", color: "#E05C5C", bg: "#FFF1F1", border: "#E05C5C" };
        return { icon: "○", label: "Mark", color: "#bbb", bg: "#F5F5F5", border: "#ddd" };
      };

      return (
        <div style={{ fontFamily: "'Segoe UI', system-ui, sans-serif", minHeight: "100vh", background: "#F5F7FA", color: "#1A1A2E" }}>

          {/* Header */}
          <div style={{ background: "linear-gradient(135deg, #1A1A2E 0%, #16213E 100%)", color: "white", padding: "20px 24px", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>
            <div>
              <div style={{ fontSize: 11, letterSpacing: 3, textTransform: "uppercase", color: "#7EC8A4", fontWeight: 600, marginBottom: 2 }}>Classroom Tool</div>
              <h1 style={{ margin: 0, fontSize: 22, fontWeight: 700, letterSpacing: -0.5 }}>Participation Tracker</h1>
              <div style={{ fontSize: 11, color: savedToast ? "#7EC8A4" : "rgba(255,255,255,0.3)", marginTop: 3, transition: "color 0.3s" }}>
                {savedToast ? "✓ Saved to this browser" : "Auto-saves to your browser"}
              </div>
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
              <div style={{ background: "rgba(255,255,255,0.08)", borderRadius: 8, padding: "4px 6px", display: "flex", gap: 4 }}>
                {["grid", "leaderboard"].map((v) => (
                  <button key={v} onClick={() => setView(v)} style={{ background: view === v ? "#4C9B82" : "transparent", color: "white", border: "none", borderRadius: 6, padding: "6px 14px", fontSize: 13, cursor: "pointer", fontWeight: view === v ? 600 : 400 }}>
                    {v === "grid" ? "🗂 Grid" : "🏆 Rank"}
                  </button>
                ))}
              </div>
              <button onClick={exportToSheets} disabled={exporting}
                style={{ background: exporting ? "rgba(255,255,255,0.05)" : "rgba(52,168,83,0.2)", color: exporting ? "rgba(255,255,255,0.3)" : "#6FCF97", border: "1px solid rgba(52,168,83,0.4)", borderRadius: 8, padding: "7px 14px", fontSize: 13, cursor: exporting ? "default" : "pointer", fontWeight: 600 }}>
                {exporting ? "Exporting…" : "📊 Export"}
              </button>
              <button onClick={undo} disabled={history.length === 0}
                style={{ background: history.length > 0 ? "rgba(255,200,80,0.2)" : "rgba(255,255,255,0.05)", color: history.length > 0 ? "#FFD166" : "rgba(255,255,255,0.25)", border: `1px solid ${history.length > 0 ? "#FFD166" : "rgba(255,255,255,0.1)"}`, borderRadius: 8, padding: "7px 14px", fontSize: 13, cursor: history.length > 0 ? "pointer" : "default", fontWeight: 600 }}>
                ↩ Undo
              </button>
              {resetConfirm !== "points" ? (
                <button onClick={() => setResetConfirm("points")} style={{ background: "rgba(255,255,255,0.1)", color: "white", border: "1px solid rgba(255,255,255,0.2)", borderRadius: 8, padding: "7px 14px", fontSize: 13, cursor: "pointer" }}>
                  ↺ Points
                </button>
              ) : (
                <div style={{ display: "flex", alignItems: "center", gap: 6, background: "rgba(224,92,92,0.2)", border: "1px solid #E05C5C", borderRadius: 8, padding: "4px 8px" }}>
                  <span style={{ fontSize: 12, color: "#FFB3B3" }}>Reset points?</span>
                  <button onClick={resetAll} style={{ background: "#E05C5C", color: "white", border: "none", borderRadius: 6, padding: "4px 10px", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>Yes</button>
                  <button onClick={() => setResetConfirm(false)} style={{ background: "rgba(255,255,255,0.1)", color: "white", border: "none", borderRadius: 6, padding: "4px 10px", fontSize: 12, cursor: "pointer" }}>No</button>
                </div>
              )}
            </div>
          </div>

          {/* Legend bar */}
          <div style={{ background: "#1A1A2E", padding: "10px 24px 14px", display: "flex", gap: 12, flexWrap: "wrap" }}>
            {CATEGORIES.map((c) => (
              <div key={c.id} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: "rgba(255,255,255,0.75)" }}>
                <div style={{ width: 8, height: 8, borderRadius: "50%", background: c.color }} />
                {c.emoji} {c.label} <span style={{ color: c.points > 0 ? "#7EC8A4" : "#E05C5C", fontWeight: 700 }}>{c.points > 0 ? "+" : ""}{c.points}</span>
              </div>
            ))}
            {/* Attendance legend */}
            <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 10, fontSize: 12, color: "rgba(255,255,255,0.5)" }}>
              <span>📋 Attendance bar on each card → tap to cycle</span>
            </div>
          </div>

          {/* Toasts */}
          {undoToast && (
            <div style={{ position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", background: "#1A1A2E", color: "white", borderRadius: 12, padding: "12px 20px", display: "flex", alignItems: "center", gap: 14, boxShadow: "0 6px 24px rgba(0,0,0,0.3)", zIndex: 999, fontSize: 14, border: "1px solid rgba(255,255,255,0.1)", whiteSpace: "nowrap" }}>
              <span style={{ color: "#aaa" }}>Awarded: <strong style={{ color: "white" }}>{undoToast.label}</strong></span>
              <button onClick={undo} style={{ background: "#FFD166", color: "#1A1A2E", border: "none", borderRadius: 8, padding: "6px 14px", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>↩ Undo</button>
              <button onClick={() => setUndoToast(null)} style={{ background: "none", border: "none", color: "#666", fontSize: 16, cursor: "pointer", padding: 0, lineHeight: 1 }}>✕</button>
            </div>
          )}

          {exportToast && (
            <div style={{ position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", background: "#1A3D2E", color: "white", borderRadius: 12, padding: "14px 20px", display: "flex", alignItems: "center", gap: 14, boxShadow: "0 6px 24px rgba(0,0,0,0.35)", zIndex: 999, fontSize: 14, border: "1px solid #4C9B82", whiteSpace: "nowrap" }}>
              <span style={{ color: "#7EC8A4" }}>✓ Data sent!</span>
              <a href="https://docs.google.com/spreadsheets/d/1IrpQDz8xj3WLarK3JjJ0GWZl-CuFobzOd6BDwkcvxow/edit" target="_blank"
                style={{ background: "#4C9B82", color: "white", fontWeight: 700, fontSize: 13, textDecoration: "none", borderRadius: 8, padding: "6px 14px", cursor: "pointer" }}>
                📊 Open Google Sheet →
              </a>
              <button onClick={() => setExportToast(null)} style={{ background: "none", border: "none", color: "#888", fontSize: 16, cursor: "pointer", padding: 0, lineHeight: 1 }}>✕</button>
            </div>
          )}

          <div style={{ padding: 20, maxWidth: 1100, margin: "0 auto" }}>

            {/* Add student */}
            <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
              <input value={newName} onChange={(e) => setNewName(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && addStudent()}
                placeholder="Add student name…"
                style={{ flex: 1, padding: "10px 14px", borderRadius: 10, border: "2px solid #E0E4EC", fontSize: 14, outline: "none", background: "white" }} />
              <button onClick={addStudent} style={{ background: "#4C9B82", color: "white", border: "none", borderRadius: 10, padding: "10px 20px", fontSize: 14, fontWeight: 600, cursor: "pointer" }}>
                + Add
              </button>
            </div>

            {/* Attendance summary banner */}
            <div style={{ background: "white", borderRadius: 14, border: "2px solid #E8EBF0", padding: "12px 18px", marginBottom: 16, display: "flex", alignItems: "center", gap: 16, flexWrap: "wrap" }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: "#555" }}>📋 Attendance</div>
              <div style={{ display: "flex", gap: 12, fontSize: 13 }}>
                <span style={{ color: "#4C9B82", fontWeight: 700 }}>✅ Present: {students.filter(s => s.attendance === "present").length}</span>
                <span style={{ color: "#E05C5C", fontWeight: 700 }}>❌ Absent: {students.filter(s => s.attendance === "absent").length}</span>
                <span style={{ color: "#aaa", fontWeight: 600 }}>○ Unmarked: {students.filter(s => s.attendance === null).length}</span>
              </div>
              <button
                onClick={() => { snapshot(students); setStudents(prev => prev.map(s => ({ ...s, attendance: null }))); }}
                style={{ marginLeft: "auto", background: "none", border: "1px solid #ddd", borderRadius: 8, padding: "5px 12px", fontSize: 12, color: "#888", cursor: "pointer" }}>
                Clear All
              </button>
              <button
                onClick={() => { snapshot(students); const today = new Date().toLocaleDateString([], { weekday: "short", month: "short", day: "numeric", year: "numeric" }); setStudents(prev => prev.map(s => ({ ...s, attendance: "present" }))); showUndoToast("All marked present"); }}
                style={{ background: "#E8F5F0", border: "1px solid #4C9B82", borderRadius: 8, padding: "5px 12px", fontSize: 12, color: "#4C9B82", fontWeight: 700, cursor: "pointer" }}>
                ✅ All Present
              </button>
            </div>

            {/* Give All bar */}
            <div style={{ background: "white", borderRadius: 14, border: "2px solid #E8EBF0", padding: "14px 18px", marginBottom: 16, display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: "#555", whiteSpace: "nowrap" }}>👥 Give All:</div>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                {CATEGORIES.filter((cat) => ["entrance", "turntalk", "offtask"].includes(cat.id)).map((cat) => (
                  <button key={cat.id} onClick={() => awardAll(cat)}
                    style={{ background: flashAll === cat.id ? cat.color : `${cat.color}18`, color: flashAll === cat.id ? "white" : cat.color, border: `2px solid ${cat.color}`, borderRadius: 9, padding: "7px 14px", fontSize: 13, fontWeight: 700, cursor: "pointer", display: "flex", alignItems: "center", gap: 6, transition: "all 0.15s" }}>
                    {cat.emoji} {cat.label}
                    <span style={{ background: flashAll === cat.id ? "rgba(255,255,255,0.3)" : `${cat.color}30`, borderRadius: 5, padding: "1px 6px", fontSize: 12 }}>
                      {cat.points > 0 ? "+" : ""}{cat.points} all
                    </span>
                  </button>
                ))}
              </div>
            </div>

            {/* Grid view */}
            {view === "grid" && (
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(160px, 1fr))", gap: 12 }}>
                {students.map((s, i) => {
                  const badge = getBadge(s.points);
                  const flashCat = CATEGORIES.find(c => c.id === flashAll);
                  const att = getAttendanceLabel(s.attendance);
                  return (
                    <div key={i}
                      style={{ background: flashAll ? `${flashCat.color}18` : selected === i ? "#E8F5F0" : getCardBg(s.points), border: flashAll ? `2px solid ${flashCat.color}` : selected === i ? "2px solid #4C9B82" : "2px solid #E8EBF0", borderRadius: 14, overflow: "hidden", cursor: "default", transition: "all 0.15s", boxShadow: selected === i ? "0 4px 16px rgba(76,155,130,0.2)" : "0 2px 6px rgba(0,0,0,0.05)", position: "relative", opacity: s.attendance === "absent" ? 0.65 : 1 }}>

                      {/* ── Attendance strip (top) ── */}
                      <button
                        onClick={(e) => { e.stopPropagation(); toggleAttendance(i); }}
                        title="Click to toggle attendance"
                        style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "6px 10px", background: att.bg, border: "none", borderBottom: `1px solid ${att.border}30`, cursor: "pointer", fontSize: 11, fontWeight: 700, color: att.color, gap: 4 }}>
                        <span>{att.icon} {att.label}</span>
                        <span style={{ fontSize: 10, color: "#bbb", fontWeight: 400 }}>tap</span>
                      </button>

                      {/* ── Points body (click to award) ── */}
                      <div
                        onClick={(e) => {
                          if (s.attendance !== "present") return;
                          if (selected === i) { setSelected(null); setPopoverPos(null); return; }
                          const rect = e.currentTarget.parentElement.getBoundingClientRect();
                          setPopoverPos({ top: rect.top + window.scrollY, left: rect.left, width: rect.width, height: rect.height });
                          setSelected(i);
                        }}
                        data-card-body="true"
                        style={{ padding: "12px 12px 8px", cursor: s.attendance === "present" ? "pointer" : "default" }}>
                        {badge && <div style={{ position: "absolute", top: 34, right: 8, fontSize: 14 }}>{badge.icon}</div>}
                        <div style={{ fontSize: 13, fontWeight: 600, color: "#333", marginBottom: 6, paddingRight: 18 }}>{s.name}</div>
                        <div style={{ fontSize: 30, fontWeight: 800, color: getPointColor(s.points), lineHeight: 1 }}>
                          {s.points > 0 ? "+" : ""}{s.points}
                        </div>
                        <div style={{ fontSize: 10, color: "#999", marginTop: 2 }}>{s.attendance === "present" ? "tap to award" : "mark present to award"}</div>
                      </div>

                      {/* ── Footer ── */}
                      <div style={{ display: "flex", justifyContent: "space-between", padding: "6px 10px 8px", borderTop: "1px solid #EEE" }}>
                        <button onClick={(e) => { e.stopPropagation(); setShowLog(showLog === i ? null : i); }}
                          style={{ background: "none", border: "none", fontSize: 11, color: "#888", cursor: "pointer", padding: 0 }}>
                          📋 {s.log.length}
                        </button>
                        <button onClick={(e) => { e.stopPropagation(); removeStudent(i); }}
                          style={{ background: "none", border: "none", fontSize: 11, color: "#ccc", cursor: "pointer", padding: 0 }}>
                          ✕
                        </button>
                      </div>

                      {showLog === i && s.log.length > 0 && (
                        <div style={{ padding: "0 10px 8px", fontSize: 11, color: "#555" }}>
                          {s.log.slice(0, 5).map((entry, ei) => (
                            <div key={ei} style={{ padding: "4px 0", borderBottom: "1px solid #f0f0f0" }}>
                              <div style={{ display: "flex", justifyContent: "space-between" }}>
                                <span>{entry.emoji} {entry.label}</span>
                                <span style={{ color: entry.pts > 0 ? "#2E7D5E" : "#C0392B", fontWeight: 700 }}>{entry.pts > 0 ? "+" : ""}{entry.pts}</span>
                              </div>
                              <div style={{ color: "#aaa", fontSize: 10, marginTop: 1 }}>{entry.date} · {entry.time}</div>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}

            {/* Leaderboard view */}
            {view === "leaderboard" && (
              <div style={{ background: "white", borderRadius: 16, overflow: "hidden", boxShadow: "0 4px 20px rgba(0,0,0,0.07)" }}>
                <div style={{ padding: "14px 20px", background: "#F8F9FC", borderBottom: "1px solid #E8EBF0", display: "grid", gridTemplateColumns: "40px 1fr 80px 130px 80px", gap: 12, fontSize: 11, fontWeight: 700, color: "#999", textTransform: "uppercase", letterSpacing: 1 }}>
                  <div>#</div><div>Student</div><div style={{ textAlign: "center" }}>Events</div><div style={{ textAlign: "center" }}>Attendance</div><div style={{ textAlign: "right" }}>Points</div>
                </div>
                {sorted.map((s, rank) => {
                  const badge = getBadge(s.points);
                  const medal = rank === 0 ? "🥇" : rank === 1 ? "🥈" : rank === 2 ? "🥉" : null;
                  const att = getAttendanceLabel(s.attendance);
                  return (
                    <div key={s.origIdx}
                      style={{ display: "grid", gridTemplateColumns: "40px 1fr 80px 130px 80px", gap: 12, padding: "0 20px", borderBottom: "1px solid #F0F2F6", background: selected === s.origIdx ? "#E8F5F0" : rank < 3 ? "#FAFBFF" : "white", transition: "background 0.1s", alignItems: "center", opacity: s.attendance === "absent" ? 0.55 : 1 }}>
                      <div style={{ fontSize: 15, textAlign: "center", padding: "14px 0" }}>{medal || <span style={{ color: "#ccc", fontSize: 13 }}>{rank + 1}</span>}</div>
                      <div
                        style={{ fontWeight: 600, fontSize: 14, cursor: s.attendance === "present" ? "pointer" : "default", padding: "14px 0" }}
                        onClick={(e) => {
                          if (s.attendance !== "present") return;
                          if (selected === s.origIdx) { setSelected(null); setPopoverPos(null); return; }
                          const rect = e.currentTarget.closest('[data-lb-row]') ? e.currentTarget.closest('[data-lb-row]').getBoundingClientRect() : e.currentTarget.getBoundingClientRect();
                          setPopoverPos({ top: rect.top + window.scrollY, left: rect.left, width: rect.width, height: rect.height });
                          setSelected(s.origIdx);
                        }}>
                        {s.name} {badge && <span style={{ fontSize: 13 }}>{badge.icon}</span>}
                        <span style={{ display: "block", fontSize: 10, color: "#aaa", fontWeight: 400 }}>{s.attendance === "present" ? "tap to award pts" : "mark present to award"}</span>
                      </div>
                      <div style={{ textAlign: "center", fontSize: 13, color: "#888", padding: "14px 0" }}>{s.log.length}</div>
                      {/* Attendance toggle in leaderboard */}
                      <div style={{ textAlign: "center", padding: "10px 0" }}>
                        <button
                          onClick={() => toggleAttendance(s.origIdx)}
                          style={{ background: att.bg, border: `1px solid ${att.border}`, borderRadius: 8, padding: "5px 10px", fontSize: 12, fontWeight: 700, color: att.color, cursor: "pointer", whiteSpace: "nowrap" }}>
                          {att.icon} {att.label}
                        </button>
                      </div>
                      <div style={{ textAlign: "right", fontWeight: 800, fontSize: 18, color: getPointColor(s.points), padding: "14px 0" }}>
                        {s.points > 0 ? "+" : ""}{s.points}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* Popover for awarding points */}
            {selected !== null && popoverPos && ReactDOM.createPortal(
              <div ref={popoverRef} style={{
                position: "absolute",
                top: (() => {
                  const panelH = 200;
                  const spaceBelow = document.documentElement.scrollHeight - (popoverPos.top + popoverPos.height);
                  return spaceBelow > panelH
                    ? popoverPos.top + popoverPos.height + 8
                    : popoverPos.top - panelH - 8;
                })(),
                left: Math.min(Math.max(popoverPos.left, 12), window.innerWidth - 352),
                width: Math.min(340, window.innerWidth - 24),
                background: "white",
                borderRadius: 14,
                border: "2px solid #4C9B82",
                padding: 16,
                boxShadow: "0 8px 32px rgba(0,0,0,0.18)",
                zIndex: 1000,
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                  <div style={{ fontWeight: 700, fontSize: 15 }}>
                    <span style={{ color: "#4C9B82" }}>🏅 Award points → {students[selected].name}</span>
                  </div>
                  <button onClick={() => { setSelected(null); setPopoverPos(null); }} style={{ background: "none", border: "none", fontSize: 18, cursor: "pointer", color: "#aaa" }}>✕</button>
                </div>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  {CATEGORIES.map((cat) => (
                    <button key={cat.id} onClick={(e) => { e.stopPropagation(); award(selected, cat); }}
                      style={{ background: cat.color, color: "white", border: "none", borderRadius: 9, padding: "9px 14px", fontSize: 13, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 6, boxShadow: "0 2px 8px rgba(0,0,0,0.12)" }}>
                      {cat.emoji} {cat.label}
                      <span style={{ background: "rgba(255,255,255,0.25)", borderRadius: 5, padding: "1px 6px", fontSize: 12 }}>
                        {cat.points > 0 ? "+" : ""}{cat.points}
                      </span>
                    </button>
                  ))}
                </div>
                <div style={{ marginTop: 12, display: "flex", justifyContent: "flex-end" }}>
                  <button onClick={() => { setSelected(null); setPopoverPos(null); }}
                    style={{ background: "#4C9B82", color: "white", border: "none", borderRadius: 9, padding: "8px 20px", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>
                    Done
                  </button>
                </div>
              </div>,
              document.body
            )}

            {/* Stats footer */}
            <div style={{ marginTop: 20, display: "flex", gap: 12, flexWrap: "wrap" }}>
              {CATEGORIES.map((cat) => {
                const count = students.reduce((acc, s) => acc + s.log.filter((l) => l.label === cat.label).length, 0);
                return (
                  <div key={cat.id} style={{ background: "white", borderRadius: 10, padding: "10px 16px", border: `2px solid ${cat.color}20`, fontSize: 13, display: "flex", alignItems: "center", gap: 8 }}>
                    <span>{cat.emoji}</span>
                    <span style={{ color: "#555" }}>{cat.label}</span>
                    <span style={{ fontWeight: 700, color: cat.color }}>{count}×</span>
                  </div>
                );
              })}
            </div>

            {/* Absent list — always visible */}
            <div style={{ marginTop: 16, background: "white", borderRadius: 14, border: "2px solid #E05C5C40", padding: "14px 18px" }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: "#E05C5C", marginBottom: 10 }}>
                ❌ Absent / Unmarked ({students.filter(s => s.attendance !== "present").length})
              </div>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                {students.filter(s => s.attendance !== "present").length === 0 ? (
                  <div style={{ fontSize: 13, color: "#aaa" }}>✅ All students are marked present.</div>
                ) : (
                  students.filter(s => s.attendance !== "present").map((s, i) => (
                    <button key={i}
                      onClick={() => toggleAttendance(students.indexOf(s))}
                      style={{ background: s.attendance === "absent" ? "#FFF1F1" : "#F5F5F5", border: `1px solid ${s.attendance === "absent" ? "#E05C5C40" : "#ddd"}`, borderRadius: 8, padding: "6px 12px", fontSize: 13, cursor: "pointer", textAlign: "left" }}>
                      <span style={{ fontWeight: 600, color: s.attendance === "absent" ? "#C0392B" : "#888" }}>{s.name}</span>
                      <span style={{ color: "#aaa", fontSize: 10, marginLeft: 6 }}>{s.attendance === "absent" ? "absent" : "unmarked"} · tap to mark present</span>
                    </button>
                  ))
                )}
              </div>
            </div>

          </div>
        </div>
      );
    }

    // Wrap card divs need data-card attribute for popover positioning — patch onClick to use parentElement
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
